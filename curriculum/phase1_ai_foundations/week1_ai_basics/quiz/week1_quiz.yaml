title: "Week 1: AI/ML 핵심 개념 퀴즈"
description: "AI/ML/DL 포함관계, 학습 패러다임, 신경망 진화, 학습 원리(데이터·손실·최적화)를 종합 점검합니다."
questions:
  - id: "w1q1"
    question: "다음 중 AI, 머신러닝(ML), 딥러닝(DL)의 관계를 가장 정확히 설명한 것은?"
    type: "multiple_choice"
    options:
      - "DL ⊃ ML ⊃ AI (딥러닝이 가장 넓은 개념)"
      - "AI ⊃ ML ⊃ DL (AI가 가장 넓고, DL은 ML의 하위 분야)"
      - "AI = ML = DL (모두 동의어)"
      - "AI와 ML은 독립, DL은 별개의 패러다임"
    answer: "1"
    explanation: "AI는 지능적 작업을 수행하는 모든 기술의 상위 개념이며, ML은 데이터로 패턴을 학습하는 AI의 하위 분야, DL은 다층 신경망을 활용하는 ML의 하위 분야입니다."

  - id: "w1q2"
    question: "지도학습(supervised learning)과 비지도학습(unsupervised learning)을 구분하는 가장 핵심적인 기준은?"
    type: "multiple_choice"
    options:
      - "모델의 크기"
      - "학습 데이터에 라벨(정답)이 존재하는가"
      - "신경망의 깊이"
      - "사용하는 옵티마이저"
    answer: "1"
    explanation: "지도학습은 (입력, 정답) 쌍으로 학습하고, 비지도학습은 라벨 없이 데이터의 구조·패턴을 학습합니다. 라벨의 유무가 본질적 구분 기준입니다."

  - id: "w1q3"
    question: "Transformer 아키텍처의 핵심 메커니즘으로, 입력 토큰 간 상호 관계를 학습하는 것은?"
    type: "multiple_choice"
    options:
      - "Convolution"
      - "Recurrence (순환)"
      - "Self-Attention"
      - "Max Pooling"
    answer: "2"
    explanation: "Transformer는 self-attention으로 모든 토큰 쌍 간 상호 관계를 가중치로 학습하며, 이것이 RNN의 순차 처리 한계를 극복한 핵심 혁신입니다."

  - id: "w1q4"
    question: "신약개발 모델 평가에서 random split이 scaffold split보다 일반적으로 더 좋은 성능을 보이는 이유는?"
    type: "multiple_choice"
    options:
      - "random split이 더 큰 데이터셋을 사용하기 때문"
      - "scaffold split이 train과 test 간 화학적 유사성을 차단해 외삽 난이도를 높이기 때문"
      - "random split의 분할 알고리즘이 더 정교하기 때문"
      - "scaffold split은 분류 과제에만 사용 가능하기 때문"
    answer: "1"
    explanation: "Random split은 같은 scaffold의 유사 분자가 train/test에 섞여 성능이 과대평가됩니다. Scaffold split은 외삽 능력을 측정해 더 임상적으로 현실적입니다."

  - id: "w1q5"
    question: "hERG 차단 분류 모델에서 양성(차단) 비율이 약 10%로 불균형이고, 위음성(차단을 놓침)이 후기 임상 실패로 이어진다고 가정합니다. 가장 적절한 손실 설계는?"
    type: "multiple_choice"
    options:
      - "단순 Binary Cross-Entropy"
      - "양성 클래스에 가중치를 둔 가중 BCE 또는 Focal Loss"
      - "MSE"
      - "Contrastive Loss"
    answer: "1"
    explanation: "클래스 불균형 + 위음성의 임상 비용이 크므로, 양성에 가중치를 부여한 가중 BCE 또는 어려운 양성 예시를 강조하는 Focal Loss가 적절합니다."

  - id: "w1q6"
    question: "신약개발 데이터가 일반 ML 데이터와 다른 특성으로, Week 1에서 강조한 것은?"
    type: "multiple_choice"
    options:
      - "라벨이 수억 개 단위로 매우 많다"
      - "라벨이 적고 활성 화합물에 편향되며 scaffold별 군집을 이룬다"
      - "모든 데이터가 균일하게 분포한다"
      - "텍스트 데이터가 대부분이다"
    answer: "1"
    explanation: "신약개발 데이터는 수백~수천 건 규모로 적고, 활성 화합물 위주로 편향되며, scaffold 단위로 강한 군집을 이뤄 random split이 성능을 과대평가합니다."

  - id: "w1q7"
    question: "약학 전공자가 ADMET 모델 설계에 참여할 때, 비전문 모델러 대비 가장 차별적인 기여 영역은?"
    type: "multiple_choice"
    options:
      - "GPU 최적화 코드 작성"
      - "어떤 파라미터·임계값이 임상적으로 의미있는지 판단하고 출력 해석"
      - "옵티마이저의 수학적 증명"
      - "데이터 라벨링 자동화 알고리즘 개발"
    answer: "1"
    explanation: "약학 전공자는 PK/PD·독성·규제 맥락을 알기 때문에 어떤 파라미터가 임상적으로 의미있는지, 어떤 임계값이 go/no-go에 적절한지를 판단할 수 있습니다."

  - id: "w1q8"
    question: "신규 AI 신약개발 과제를 만났을 때 Week 1이 제시한 6개 체크리스트에 포함되지 않는 항목은?"
    type: "multiple_choice"
    options:
      - "표현(입력 형태) 결정"
      - "손실 설계와 비용 비대칭"
      - "GPU 제조사 선택"
      - "분할·평가 방식과 불확실성 보고"
    answer: "2"
    explanation: "Week 1 체크리스트는 표현·과제·학습 신호·손실·분할·신뢰성(AD+불확실성)에 관한 것입니다. 하드웨어 선택은 본질적 모델 설계 결정이 아닙니다."

  - id: "w1q9"
    question: "AI 신약개발 스타트업의 차별점에 대해 Week 1이 강조한 통합 메시지로 가장 적합한 것은?"
    type: "multiple_choice"
    options:
      - "가장 큰 단일 거대 모델을 보유하는 것"
      - "최신 GPU 클러스터의 규모"
      - "모듈 조합·평가 신뢰성·약학적 의사결정의 통합"
      - "가장 많은 특허 보유"
    answer: "2"
    explanation: "Insilico 등 선도 회사 사례에서 보듯, 단일 거대 모델이 아닌 단계별 모듈 조합과 평가 신뢰성, 약학적 판단 통합이 실제 차별 요소로 작동합니다."

  - id: "w1q10"
    question: "Phase 1 수준에서 약학 전공자가 AI 신약개발 창업을 준비할 때 우선순위로 가장 적합한 것은?"
    type: "multiple_choice"
    options:
      - "당장 SaaS 가격 정책부터 확정한다"
      - "AI/ML 기본 개념과 신약개발 파이프라인 매핑을 먼저 학습해, 어디에 차별점을 둘지 좌표를 잡는다"
      - "Transformer를 처음부터 직접 구현해본다"
      - "투자자 미팅을 먼저 잡고 나서 학습한다"
    answer: "1"
    explanation: "Phase 1의 목표는 기술 지도와 파이프라인 매핑을 통해 자신의 차별 좌표를 식별하는 것입니다. BM·투자 등 비즈니스 결정은 Phase 5에서 본격적으로 다룹니다."
