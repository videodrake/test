title: "Week 1: AI/ML 핵심 개념 퀴즈"
description: "AI·ML·DL의 위계, 학습 패러다임, 딥러닝 아키텍처, 학습 원리(데이터·손실·최적화)를 종합 점검합니다. 신약개발 의사결정 맥락에 맞는 선택을 묻습니다."
questions:
  - id: "w1q1"
    question: "AI, 머신러닝(ML), 딥러닝(DL)의 관계를 가장 정확히 설명한 것은?"
    type: "multiple_choice"
    options:
      - "AI ⊂ ML ⊂ DL — 딥러닝이 가장 넓은 개념이다"
      - "DL ⊂ ML ⊂ AI — 딥러닝은 ML의 하위, ML은 AI의 하위 분야이다"
      - "AI = ML = DL — 세 용어는 동의어이며 상호 교체 가능하다"
      - "AI와 ML은 같지만 DL은 별개의 분야이다"
    answer: "1"
    explanation: "AI가 가장 넓은 개념이고, ML은 데이터로부터 패턴을 학습하는 AI의 하위 분야이며, DL은 다층 신경망을 사용하는 ML의 하위 분야입니다(Day 1)."

  - id: "w1q2"
    question: "지도학습·비지도학습·강화학습의 구분 기준으로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "사용하는 프로그래밍 언어의 차이"
      - "모델이 받는 학습 신호의 형태(라벨/입력 자체/보상)"
      - "신경망의 깊이(얕은 망/깊은 망)"
      - "GPU 사용 여부"
    answer: "1"
    explanation: "세 패러다임의 본질적 구분은 학습 신호의 형태입니다 — 라벨이면 지도, 입력 자체이면 비지도/SSL, 환경 보상이면 강화학습(Day 2)."

  - id: "w1q3"
    question: "보편 근사 정리(Universal Approximation Theorem)의 약학적 함의로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "충분한 뉴런이 있으면 어떤 분자 활성 함수도 근사할 수 있으나, 실무적으로는 깊은 망이 동일 함수를 적은 파라미터로 표현해 효율적이다"
      - "신경망은 어떤 데이터로도 100% 정확도를 달성한다"
      - "약학 데이터에는 보편 근사 정리가 적용되지 않는다"
      - "데이터가 적으면 정리가 자동으로 성립하지 않는다"
    answer: "0"
    explanation: "정리는 표현력의 존재를 보장하지만 일반화는 보장하지 않습니다. 깊은 망은 동일 함수를 더 효율적으로 표현하는 것이 실무 강점입니다(Day 3)."

  - id: "w1q4"
    question: "Adam 옵티마이저의 가장 핵심적인 특징은?"
    type: "multiple_choice"
    options:
      - "전체 데이터로 한 번에 기울기를 계산한다"
      - "1차·2차 모멘트를 추정해 파라미터별 학습률을 적응적으로 조절한다"
      - "비지도학습 전용 알고리즘이다"
      - "기울기 소실을 자동으로 해결한다"
    answer: "1"
    explanation: "Adam은 1차·2차 모멘트(평균·분산)를 EMA로 추정해 파라미터별 적응 학습률을 만듭니다. 신약개발 GNN/Transformer 학습의 기본값으로 자리잡았습니다(Day 4)."

  - id: "w1q5"
    question: "ChEMBL의 약 240만 화합물 중 라벨이 부족한 신규 타겟에 대해 분자 표현 모델을 만들려 한다. 가장 적합한 접근은?"
    type: "multiple_choice"
    options:
      - "수백 개 라벨로 처음부터 깊은 GNN을 지도학습으로만 학습"
      - "무라벨 화합물 전체로 자기지도 사전학습 후, 소량 라벨로 미세조정"
      - "강화학습으로 분자를 생성하면서 동시에 라벨 예측을 시킨다"
      - "라벨이 충분히 모일 때까지 학습을 시작하지 않는다"
    answer: "1"
    explanation: "라벨 부족 상황의 표준 전략은 SSL 사전학습 + 소량 라벨 미세조정입니다(MolFormer 사례, Day 2·3)."

  - id: "w1q6"
    question: "hERG 차단 분류 모델에서 위양성과 위음성의 비용이 비대칭이다(위음성이 임상에서 훨씬 위험). 가장 합리적인 손실함수 선택은?"
    type: "multiple_choice"
    options:
      - "단순 MSE 회귀 손실"
      - "균등 가중 Binary Cross-Entropy"
      - "양성 클래스에 가중치를 둔 Weighted BCE 또는 Focal Loss"
      - "K-means 군집화 손실"
    answer: "2"
    explanation: "위양성/위음성 비용 비대칭과 클래스 불균형(양성 약 10%) 상황에서는 가중 BCE 또는 Focal Loss가 단순 BCE보다 임상적 의사결정에 부합합니다(Day 4)."

  - id: "w1q7"
    question: "MoleculeNet 벤치마크에서 동일 모델이 random split에서 ROC-AUC 0.90, scaffold split에서 0.72를 보였다. 약학 전공자로서 가장 합리적인 해석은?"
    type: "multiple_choice"
    options:
      - "scaffold split이 잘못 구성된 결과로, 무시한다"
      - "두 값을 평균해 0.81로 보고한다"
      - "신규 scaffold로의 외삽 능력이 0.72 수준이며, 실제 신약 탐색의 일반화는 이 값에 가깝다"
      - "모델을 폐기하고 처음부터 다시 학습한다"
    answer: "2"
    explanation: "약물 탐색은 신규 scaffold 외삽이 본질이므로 scaffold split이 임상 현실에 더 부합합니다. random split 점수는 과대평가 가능성이 높습니다(Day 4)."

  - id: "w1q8"
    question: "강화학습 기반 분자 생성에서 '보상 해킹(reward hacking)'을 방지하기 위해 약학 전공자가 보상 함수에 추가해야 할 항목으로 가장 우선순위가 높은 것은?"
    type: "multiple_choice"
    options:
      - "분자 색상 점수"
      - "합성 가능성(SAscore), 약물 유사성(QED), ADMET 필터의 결합"
      - "SMILES 길이의 제곱"
      - "GPU 사용 시간"
    answer: "1"
    explanation: "활성 점수만으로는 합성 불가능하거나 독성이 높은 분자가 보상을 극대화할 수 있습니다. SAscore·QED·ADMET 필터 결합이 표준 방어책입니다(Day 2)."

  - id: "w1q9"
    question: "약학 전공자가 AI 신약개발 스타트업에서 차별화하기 가장 자연스러운 결정 지점은?"
    type: "multiple_choice"
    options:
      - "GPU 클러스터 구매 협상"
      - "Python 가비지 컬렉션 튜닝"
      - "데이터 분할 방식·손실 가중·평가 임계값 설정 등 약학적 의사결정이 들어가는 4개 결정 지점"
      - "딥러닝 프레임워크 자체 개발"
    answer: "2"
    explanation: "약학 전공자의 차별적 가치는 임상 의사결정 맥락을 반영한 분할·손실·평가 설계에서 발휘됩니다. 기술 자체는 오픈소스로 빠르게 복제됩니다(Day 4·5)."

  - id: "w1q10"
    question: "AI 신약개발 시장에서 기술 자체(예: SoTA 모델 구현)만으로 해자(moat)를 구축하기 어려운 가장 큰 이유는?"
    type: "multiple_choice"
    options:
      - "AI 모델은 특허 보호를 받지 못한다"
      - "MolFormer·AlphaFold 3 등 SoTA 모델이 빠르게 오픈소스로 복제되며, 차별화는 문제 정의·약학적 학습 설계·임상 번역 능력에서 발생한다"
      - "AI 신약개발은 시장이 너무 작다"
      - "딥러닝은 신약개발에 적합하지 않다"
    answer: "1"
    explanation: "기술은 빠르게 평준화됩니다. 진짜 해자는 문제 정의 능력, 약학적 학습 설계, 임상 의사결정 번역 능력에서 발생합니다(Day 5 종합)."
