title: "Week 1: AI/ML 핵심 개념 퀴즈"
description: "AI/ML/DL 위계, 3대 학습 패러다임, 딥러닝 아키텍처, 학습 원리(데이터·손실·최적화)에 대한 종합 퀴즈입니다. 각 문항은 약학 전공자가 신약개발 의사결정 맥락에서 개념을 어떻게 적용할지 점검하도록 설계되어 있습니다."
questions:
  - id: "w1q1"
    question: "AI, 머신러닝(ML), 딥러닝(DL)의 관계를 가장 정확하게 기술한 것은?"
    type: "multiple_choice"
    options:
      - "AI ⊂ ML ⊂ DL (DL이 가장 넓은 개념)"
      - "AI ⊃ ML ⊃ DL (ML은 AI의 하위, DL은 ML의 하위)"
      - "AI와 ML은 동의어이고, DL은 별개 분야이다"
      - "ML과 DL은 같은 범주이며 AI는 그 응용 분야이다"
    answer: "1"
    explanation: "AI는 가장 넓은 개념이고, ML은 데이터로부터 패턴을 학습하는 AI의 하위 분야, DL은 다층 신경망을 사용하는 ML의 하위 분야입니다. 규칙 기반 전문가 시스템처럼 ML이 아닌 AI도 존재합니다."

  - id: "w1q2"
    question: "지도학습(supervised), 비지도학습(unsupervised), 강화학습(RL)의 구분 기준은 무엇인가?"
    type: "multiple_choice"
    options:
      - "사용하는 신경망 아키텍처의 종류"
      - "모델이 받는 학습 신호(supervision signal)의 형태"
      - "데이터의 절대적 크기"
      - "학습에 사용되는 GPU 개수"
    answer: "1"
    explanation: "세 패러다임은 학습 신호의 형태로 구분됩니다. 정답 라벨(지도), 입력 자체의 구조(비지도), 환경과의 상호작용에서 오는 보상(강화)이 각각의 신호입니다. 아키텍처는 직교적 선택입니다."

  - id: "w1q3"
    question: "다음 중 자기지도학습(self-supervised learning, SSL)으로 사전학습된 분자/단백질 모델로 가장 적절한 사례는?"
    type: "multiple_choice"
    options:
      - "임상시험 환자 데이터로 학습된 logistic regression"
      - "MoLFormer-XL — PubChem·ZINC 약 11억 분자에서 마스크 언어 모델링으로 학습"
      - "단일 기업의 hERG patch-clamp 1만 건 라벨로 학습된 Random Forest"
      - "강화학습 보상으로 분자 SMILES를 생성하는 GENTRL"
    answer: "1"
    explanation: "SSL은 라벨 없이 입력 일부를 가리고 복원하도록 사전학습합니다. MolFormer-XL은 약 11억 무라벨 SMILES를 마스크 언어 모델링으로 학습한 대표 사례입니다. 나머지는 지도학습 또는 강화학습입니다."

  - id: "w1q4"
    question: "분자 그래프 데이터에 가장 자연스러운 귀납 편향(inductive bias)을 제공하는 딥러닝 아키텍처는?"
    type: "multiple_choice"
    options:
      - "Convolutional Neural Network(CNN)"
      - "Recurrent Neural Network(RNN)"
      - "Graph Neural Network(GNN)"
      - "Multi-Layer Perceptron(MLP) on flattened atom features"
    answer: "2"
    explanation: "GNN은 원자=노드, 결합=엣지로 구성된 분자 그래프에 직접 메시지 패싱을 적용해 화학적 이웃 구조를 보존합니다. CNN은 격자, RNN은 순차, MLP는 무구조 데이터에 적합합니다."

  - id: "w1q5"
    question: "신약개발 분자 모델 평가에서 random split 대신 scaffold split을 사용해야 하는 가장 타당한 이유는?"
    type: "multiple_choice"
    options:
      - "scaffold split이 random split보다 항상 더 높은 ROC-AUC를 보고하므로"
      - "GPU 메모리 사용량을 줄이기 위해"
      - "신약 탐색은 본질적으로 새로운 scaffold로의 외삽이며, scaffold split이 이 능력을 더 정직하게 측정하기 때문"
      - "scaffold split은 라벨 비용을 줄이는 기법이기 때문"
    answer: "2"
    explanation: "MoleculeNet 등 표준 벤치마크에서 동일 모델이 scaffold split에서 ROC-AUC 0.10~0.20 낮게 나오는 것이 일반적입니다. 약물 탐색은 외삽 문제이므로 scaffold split이 임상 현실을 더 잘 반영합니다."

  - id: "w1q6"
    question: "hERG 차단 분류 모델에서 양성 클래스(차단)가 약 10%로 불균형이고, 임상에서 위음성(차단 놓침)의 비용이 위양성보다 훨씬 크다. 손실함수로 가장 합리적인 선택은?"
    type: "multiple_choice"
    options:
      - "단순 MSE 회귀 손실"
      - "표준 Binary Cross-Entropy(BCE)에 가중치를 주거나 Focal Loss를 사용"
      - "InfoNCE 대조 학습 손실"
      - "Mean Absolute Error(MAE)"
    answer: "1"
    explanation: "클래스 불균형 + 비대칭 비용에는 양성 클래스 가중 BCE 또는 Focal Loss가 표준입니다. MSE/MAE는 회귀, InfoNCE는 표현 학습용이라 분류에 부적합합니다."

  - id: "w1q7"
    question: "분자 생성에서 강화학습 기반 접근의 약학 전공자 차별화 포인트로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "GPU 클러스터를 더 크게 구축하는 것"
      - "PyTorch 대신 JAX로 학습 코드를 다시 작성하는 것"
      - "pIC50·합성 가능성·ADMET·임상 우선순위를 임상 의사결정 맥락에 맞게 가중하는 다중 보상(MPO) 함수 설계"
      - "SMILES 토큰 vocabulary를 늘리는 것"
    answer: "2"
    explanation: "강화학습 기반 분자 생성의 성패는 보상 함수 설계가 좌우합니다. 임상 우선순위에 맞는 가중치 결정은 약학 전공자가 비약학 ML 엔지니어 대비 비대칭적 우위를 갖는 영역입니다."

  - id: "w1q8"
    question: "Insilico Medicine이 INS018_055 (TNIK 저해 IPF 후보)를 타겟 발굴부터 임상 Phase II까지 도달시킨 데 걸린 시간으로 보고된 값은?"
    type: "multiple_choice"
    options:
      - "약 6개월"
      - "약 30개월"
      - "약 8년"
      - "약 12년 (전통적 신약개발과 동일)"
    answer: "1"
    explanation: "Insilico Medicine은 INS018_055를 약 30개월에 임상 Phase II까지 진입시켰다고 보고했습니다. 이는 전통적 평균(10-15년) 대비 약 4배 빠른 속도이며, AI 신약개발의 대표 사례로 인용됩니다."

  - id: "w1q9"
    question: "약학 전공 창업자가 비약학 ML 엔지니어 대비 비대칭적 우위를 가장 크게 누릴 수 있는 의사결정 단계는?"
    type: "multiple_choice"
    options:
      - "Transformer의 어텐션 헤드 개수 같은 아키텍처 하이퍼파라미터 조정"
      - "임상 의사결정 맥락에 맞는 문제 정의(①), 어세이/단위의 약학적 데이터 정제(②), 외삽 위험을 반영한 평가 프로토콜(⑤)"
      - "PyTorch vs TensorFlow 같은 프레임워크 선택"
      - "GPU 종류(A100 vs H100) 결정"
    answer: "1"
    explanation: "오픈소스 모델 코드와 사전학습 가중치가 보편화된 환경에서, 차별화는 모델 양 끝단인 ①(임상 의사결정 정의), ②(약학적 데이터 검증), ⑤(임상 의미 있는 평가)에서 발생합니다. 이것이 Week 1의 핵심 인사이트입니다."

  - id: "w1q10"
    question: "AI 신약개발 SaaS를 설계할 때 모델 출력 형태로 가장 임상적으로 신뢰할 수 있는 선택은?"
    type: "multiple_choice"
    options:
      - "단일 점추정값(point estimate)만 반환"
      - "예측값 + 적용 영역(applicability domain) + 불확실성(MC Dropout/앙상블) 동반 반환"
      - "신뢰성을 줄이기 위해 일부러 노이즈를 추가한 출력"
      - "모델 가중치 파일 자체를 클라이언트에게 직접 전송"
    answer: "1"
    explanation: "임상 의사결정에서는 외삽 영역 식별과 불확실성 보고가 모델 신뢰성의 핵심입니다. 점추정만 반환하는 모델은 실수를 감지하기 어렵고, 약학적으로 위험한 의사결정으로 이어질 수 있습니다."
