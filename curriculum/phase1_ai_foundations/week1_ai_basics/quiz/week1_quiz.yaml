title: "Week 1: AI/ML 핵심 개념 퀴즈"
description: "AI/ML/DL의 위계, 머신러닝 3패러다임, 신경망 아키텍처, 학습 원리(데이터·손실·최적화)와 신약개발 의사결정 연결을 점검합니다."
questions:
  - id: "w1q1"
    question: "AI, 머신러닝(ML), 딥러닝(DL)의 관계를 가장 정확히 설명한 것은?"
    type: "multiple_choice"
    options:
      - "AI ⊂ ML ⊂ DL의 포함 관계로, 딥러닝이 가장 넓은 개념이다"
      - "DL ⊂ ML ⊂ AI의 포함 관계로, 딥러닝은 다층 신경망을 사용하는 ML의 하위 분야다"
      - "셋은 서로 독립적인 분야로, 신약개발에서는 각각 다른 문제에 사용된다"
      - "ML과 DL은 같은 개념이며, AI는 그보다 넓은 규칙 기반 시스템만을 의미한다"
    answer: "1"
    explanation: "AI가 가장 넓은 개념이고, 그 안에 데이터로 패턴을 학습하는 ML, 그 안에 다층 신경망을 사용하는 DL이 포함됩니다. 규칙 기반 시스템도 AI에 포함됩니다."

  - id: "w1q2"
    question: "지도학습·비지도학습·강화학습을 구분하는 가장 본질적인 기준은?"
    type: "multiple_choice"
    options:
      - "사용하는 신경망 아키텍처의 종류"
      - "모델이 받는 학습 신호(supervision signal)의 형태"
      - "데이터셋의 크기"
      - "학습에 걸리는 시간"
    answer: "1"
    explanation: "지도학습은 라벨, 비지도학습은 입력 자체의 구조, 강화학습은 보상이라는 서로 다른 학습 신호 형태로 구분됩니다. 아키텍처·크기·시간은 패러다임을 결정하지 않습니다."

  - id: "w1q3"
    question: "분자 그래프 데이터의 구조를 가장 자연스럽게 활용하는 신경망 아키텍처는?"
    type: "multiple_choice"
    options:
      - "Convolutional Neural Network (CNN)"
      - "Recurrent Neural Network (RNN)"
      - "Graph Neural Network (GNN)"
      - "Multi-Layer Perceptron (MLP)"
    answer: "2"
    explanation: "GNN은 원자를 노드, 결합을 엣지로 두고 이웃 간 메시지 전달로 분자 표현을 학습합니다. CNN은 격자 데이터, RNN은 시퀀스, MLP는 고정 차원 벡터에 적합합니다."

  - id: "w1q4"
    question: "딥러닝에서 활성화 함수가 비선형이어야 하는 이유로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "비선형 활성화 함수가 학습 속도를 빠르게 한다"
      - "선형 함수만 쌓으면 전체가 하나의 선형 변환과 동등해 표현력이 늘지 않는다"
      - "비선형 활성화 함수가 과적합을 자동으로 방지한다"
      - "비선형 활성화 함수만 미분 가능하기 때문이다"
    answer: "1"
    explanation: "선형 함수의 합성은 여전히 선형이므로, 층을 쌓아도 표현력이 단일 선형 변환을 넘지 못합니다. ReLU·GELU 등 비선형 활성화가 깊이의 표현력을 만듭니다."

  - id: "w1q5"
    question: "신약개발 분자 활성 예측 모델을 평가할 때 random split이 아닌 scaffold split을 권장하는 이유로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "scaffold split이 random split보다 항상 더 높은 ROC-AUC를 만든다"
      - "scaffold split은 train과 test에 유사 골격이 섞이는 것을 막아 신규 scaffold로의 외삽 능력을 측정한다"
      - "scaffold split은 데이터 분포가 모두 동일하다고 가정해 분석이 단순해진다"
      - "scaffold split은 라벨 노이즈를 자동으로 제거한다"
    answer: "1"
    explanation: "약물 탐색은 본질적으로 신규 scaffold로의 외삽 문제이며, random split은 scaffold가 섞여 성능을 과대평가합니다. scaffold split이 임상 현실을 더 잘 반영합니다."

  - id: "w1q6"
    question: "hERG 차단 분류 모델에서 양성 클래스 비율이 약 10%이고, 위음성(차단을 놓침)의 임상 비용이 위양성보다 훨씬 큽니다. 가장 적합한 손실 함수 설계는?"
    type: "multiple_choice"
    options:
      - "표준 MSE로 회귀처럼 다룬다"
      - "표준 BCE를 그대로 사용한다"
      - "양성에 가중치를 둔 가중 BCE 또는 Focal Loss를 사용한다"
      - "정확도를 직접 최적화하는 0-1 손실을 사용한다"
    answer: "2"
    explanation: "클래스 불균형과 비용 비대칭이 동시에 있을 때, 양성에 가중치를 둔 BCE나 어려운 양성에 집중하는 Focal Loss가 표준 BCE보다 약학적 의사결정과 더 잘 맞습니다."

  - id: "w1q7"
    question: "라벨이 수백 건뿐인 새로운 표적의 활성 예측 문제를 풀어야 합니다. ChEMBL의 무라벨 분자 240만 건은 풍부합니다. 가장 합리적인 전략은?"
    type: "multiple_choice"
    options:
      - "수백 건으로 처음부터 깊은 GNN을 학습한다"
      - "강화학습 기반 분자 생성으로 문제를 우회한다"
      - "무라벨 데이터로 자기지도 사전학습 → 표적 라벨로 미세조정한다"
      - "데이터가 부족하므로 머신러닝을 포기하고 규칙 기반 필터를 만든다"
    answer: "2"
    explanation: "SSL 사전학습으로 분자 표현을 먼저 학습한 뒤 적은 라벨로 미세조정하는 pretrain-finetune 전략이 작은 데이터에서 표준입니다. 처음부터 학습은 과적합 위험이 큽니다."

  - id: "w1q8"
    question: "AI 신약개발 스타트업을 준비하는 약학 전공 창업자가 글로벌 모델러 중심 회사 대비 가장 차별화하기 좋은 포지션은?"
    type: "multiple_choice"
    options:
      - "더 큰 GPU 클러스터를 갖추는 것"
      - "최신 Transformer 아키텍처를 가장 먼저 구현하는 것"
      - "AI 모델 의사결정의 약학적 책임자(scientific lead) 포지션을 잡고 임상 의사결정 맥락을 모델 설계·평가에 내재화하는 것"
      - "오픈소스 모델을 그대로 쓰지 않고 모든 모델을 처음부터 다시 구현하는 것"
    answer: "2"
    explanation: "대형 모델러 회사와 인프라·아키텍처로 경쟁하기보다, 약학 지식이 직접 필요한 손실 설계·임계값·임상 번역 영역에서 차별점을 만드는 것이 합리적입니다."

  - id: "w1q9"
    question: "Insilico Medicine이 INS018_055(특발성 폐섬유증 후보)를 빠르게 발굴할 수 있었던 핵심 요인 중 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "새로운 단일 모델 하나로 모든 단계를 풀었기 때문"
      - "비지도 표적 발굴 → 강화학습 분자 생성 → ADMET 다중 보상으로 이어지는 패러다임·아키텍처·평가의 조합 설계"
      - "임상시험 단계를 모두 생략했기 때문"
      - "AI 없이 전통적 high-throughput screening만 사용했기 때문"
    answer: "1"
    explanation: "Pharma.AI는 PandaOmics(표적)·Chemistry42(생성)·평가의 조합으로 작동합니다. 단일 모델이 아니라 단계별 적합한 패러다임을 조합한 것이 핵심입니다."

  - id: "w1q10"
    question: "AI 신약개발 SaaS 제품의 신뢰성을 약학적 관점에서 가장 잘 보강하는 출력 설계는?"
    type: "multiple_choice"
    options:
      - "예측값(점추정) 하나만 깔끔하게 보여준다"
      - "예측값 + 불확실성(신뢰구간) + 적용 영역(AD) 정보를 함께 제공한다"
      - "예측값을 그래프로만 시각화하고 수치는 숨긴다"
      - "원시 모델 가중치를 그대로 사용자에게 노출한다"
    answer: "1"
    explanation: "약학적 의사결정에는 점추정만으로 부족합니다. 외삽 영역에서 얼마나 신뢰할 수 있는지를 알려주는 불확실성과 AD 정보가 임상 활용 가능성을 좌우합니다."
