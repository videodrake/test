title: "Week 1: AI/ML 핵심 개념 퀴즈"
description: "Day 1~5에서 다룬 AI/ML/DL의 위계, 학습 패러다임, 신경망 아키텍처, 학습 원리, 그리고 약학 친화 의사결정을 점검합니다."
questions:
  - id: "w1q1"
    question: "AI, 머신러닝(ML), 딥러닝(DL)의 관계를 가장 정확하게 기술한 것은?"
    type: "multiple_choice"
    options:
      - "AI ⊂ ML ⊂ DL — DL이 가장 넓은 개념이다"
      - "AI ⊃ ML ⊃ DL — DL은 ML의 한 갈래이고, ML은 AI의 한 갈래이다"
      - "AI와 ML은 동의어이며 DL은 별개의 학문이다"
      - "DL은 AI에 속하지 않는 독립적 통계 기법이다"
    answer: "1"
    explanation: "DL은 다층 신경망을 사용하는 ML의 하위 분야이며, ML은 데이터에서 패턴을 학습하는 AI의 하위 분야입니다. Day 1에서 정립한 위계입니다."

  - id: "w1q2"
    question: "다음 중 자기지도학습(SSL)의 가장 정확한 정의는?"
    type: "multiple_choice"
    options:
      - "사람이 라벨을 일일이 단 데이터로 학습하는 방식"
      - "환경에서 보상을 받아 정책을 학습하는 방식"
      - "입력 자체의 일부를 가리고 그 부분을 예측하도록 만들어 라벨 없이 표현을 학습하는 방식"
      - "여러 모델의 예측을 평균 내어 성능을 높이는 방식"
    answer: "2"
    explanation: "SSL은 비지도학습의 한 형태로, 입력의 일부를 가리고 복원시키는 방식으로 라벨 없이 표현을 학습합니다. ChemBERTa, MolFormer, ESM-2 등이 대표 사례입니다."

  - id: "w1q3"
    question: "딥러닝 학습 루프의 4단계 순서로 옳은 것은?"
    type: "multiple_choice"
    options:
      - "Forward → Loss → Backward → Update"
      - "Loss → Forward → Update → Backward"
      - "Backward → Forward → Loss → Update"
      - "Update → Forward → Backward → Loss"
    answer: "0"
    explanation: "예측값 산출(Forward) → 오차 계산(Loss) → 미분 역전파(Backward) → 가중치 갱신(Update) 순으로 한 사이클이 돌아갑니다."

  - id: "w1q4"
    question: "Transformer의 자기 주의(self-attention)가 이전 RNN/LSTM 대비 갖는 핵심 이점은?"
    type: "multiple_choice"
    options:
      - "파라미터 수가 더 적어 학습이 빠르다"
      - "임의의 두 입력 원소가 직접 상호작용하는 가중치를 학습할 수 있어 장거리 의존성을 더 잘 잡는다"
      - "GPU가 필요하지 않다"
      - "비지도학습에서만 사용 가능하다"
    answer: "1"
    explanation: "RNN은 순차 처리로 장거리 의존성이 약하지만, self-attention은 모든 토큰 쌍의 관계를 직접 학습합니다. 이 구조가 GPT·AlphaFold·MolFormer의 공통 뿌리입니다."

  - id: "w1q5"
    question: "신규 키나제 타겟에 대한 활성 화합물을 ChEMBL의 무라벨 분자 1억 개와 표적 라벨 2,000건으로 예측하려고 합니다. 가장 적절한 전략은?"
    type: "multiple_choice"
    options:
      - "라벨 2,000건만으로 GNN을 처음부터 학습"
      - "강화학습만으로 분자를 생성"
      - "무라벨 분자로 SSL 사전학습을 한 모델 위에 라벨 2,000건으로 미세조정"
      - "Random Forest를 무라벨 데이터에 적용"
    answer: "2"
    explanation: "라벨이 부족할 때는 SSL 사전학습 + 소량 라벨 미세조정이 표준입니다. 이는 Day 2·4에서 강조한 라벨 효율성 전략의 핵심입니다."

  - id: "w1q6"
    question: "hERG 차단 분류 모델에서 양성 클래스(차단)가 약 10%에 불과한 클래스 불균형이 있고, 위음성(차단을 놓침)의 임상 비용이 매우 큽니다. 가장 적절한 손실 설계는?"
    type: "multiple_choice"
    options:
      - "표준 BCE 그대로 사용"
      - "MSE 회귀로 전환"
      - "양성 가중 BCE 또는 Focal Loss"
      - "Contrastive Loss 사용"
    answer: "2"
    explanation: "비대칭 비용과 클래스 불균형이 동시에 있을 때는 양성 클래스에 가중치를 주는 BCE 또는 어려운 샘플에 집중하는 Focal Loss가 적합합니다. Day 4에서 다룬 약학 친화 손실 설계입니다."

  - id: "w1q7"
    question: "동일 분자 물성 모델이 random split에서는 ROC-AUC 0.90, scaffold split에서는 0.72를 기록했습니다. 이 결과의 약학적 의미로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "모델은 어떤 분할에서도 동일하게 신뢰할 수 있다"
      - "Random split이 더 정확한 평가이므로 0.90을 보고해야 한다"
      - "신규 scaffold(외삽)에서는 성능이 크게 떨어지므로, 약물 탐색의 임상적 현실은 0.72에 더 가깝다"
      - "Scaffold split은 항상 random split보다 점수가 낮으므로 무시해도 된다"
    answer: "2"
    explanation: "약물 탐색은 본질적으로 신규 scaffold로의 외삽 문제입니다. Random split은 유사 분자 누수로 성능을 과대평가하므로, 임상적 현실을 반영하는 scaffold split 결과를 기준으로 의사결정해야 합니다."

  - id: "w1q8"
    question: "약학 전공자가 AI 신약개발 스타트업에서 발휘할 수 있는 가장 차별적인 경쟁력으로 볼 수 있는 것은?"
    type: "multiple_choice"
    options:
      - "최신 GPU를 가장 빠르게 구매하는 능력"
      - "Transformer 가중치를 직접 코딩하는 능력"
      - "모델 출력의 임상적 의미 해석, 임계값 설정, 비대칭 비용을 반영한 손실/보상 설계"
      - "모든 ML 논문을 한 달 안에 읽는 능력"
    answer: "2"
    explanation: "코드와 GPU는 외주·바이브코딩·클라우드로 해결되지만, 임상적 맥락의 해석은 약학 지식이 직접 가치를 만드는 영역입니다. Week 1에서 반복적으로 강조한 차별점입니다."

  - id: "w1q9"
    question: "AI 신약개발 SaaS를 설계할 때, 모델 출력에 함께 제공해야 할 약학 친화 정보로 가장 중요한 것은?"
    type: "multiple_choice"
    options:
      - "예측값 점추정 하나만 보고"
      - "예측값 + 불확실성(신뢰구간) + 적용 영역(AD) flag"
      - "모델의 모든 가중치 행렬"
      - "학습에 사용된 GPU 모델명"
    answer: "1"
    explanation: "약학적 의사결정은 점추정만으로 불가능합니다. 불확실성과 적용 영역을 함께 제공해야 사용자가 외삽 영역과 신뢰 가능 영역을 구분할 수 있고, 이것이 B2B 신약 SaaS의 신뢰성 차별 포인트입니다."

  - id: "w1q10"
    question: "Insilico Medicine의 INS018_055 사례(타겟 발굴부터 임상 Phase II까지 약 30개월)가 보여주는 AI 신약개발의 핵심 교훈은?"
    type: "multiple_choice"
    options:
      - "단일 모델 하나가 모든 단계를 해결한다"
      - "AI는 임상시험 자체를 대체한다"
      - "지도학습·SSL·강화학습·구조 예측 등 여러 AI 기술의 결합과 약학적 우선순위 반영이 사이클 단축의 핵심이다"
      - "AI가 있으면 더 이상 wet-lab 검증이 필요 없다"
    answer: "2"
    explanation: "Insilico의 사례는 단일 모델이 아니라 Week 1에서 다룬 모든 패러다임·아키텍처·약학적 의사결정의 조합 결과입니다. AI가 wet-lab과 임상을 대체하는 것이 아니라 사이클을 단축한다는 점이 핵심입니다."
