title: "Week 1: AI/ML 핵심 개념 퀴즈"
description: "AI·ML·DL의 위계, 학습 패러다임, 딥러닝 아키텍처, 학습 루프 4단계를 신약개발 맥락에서 적용할 수 있는지 점검합니다."
questions:
  - id: "w1q1"
    question: "AI, 머신러닝(ML), 딥러닝(DL)의 관계로 가장 정확한 것은?"
    type: "multiple_choice"
    options:
      - "AI ⊂ ML ⊂ DL (AI가 가장 좁은 개념)"
      - "AI ⊃ ML ⊃ DL (DL은 ML의 부분집합, ML은 AI의 부분집합)"
      - "AI = ML ≠ DL (AI와 ML은 동의어)"
      - "DL ⊃ AI ⊃ ML (DL이 가장 넓은 개념)"
    answer: "1"
    explanation: "AI는 가장 넓은 개념이고, 그 안에 데이터로부터 학습하는 ML이 있으며, ML 중 다층 신경망을 쓰는 부분이 DL입니다. 규칙 기반 시스템은 AI이지만 ML은 아닐 수 있습니다."

  - id: "w1q2"
    question: "ChEMBL의 약 240만 무라벨 분자로 분자 표현을 사전학습한 뒤, 소량의 IC50 라벨로 미세조정해 키나제 활성을 예측하려고 합니다. 이 전략의 학습 패러다임 조합으로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "강화학습 → 비지도학습"
      - "지도학습만 단독 사용"
      - "자기지도학습(SSL) → 지도학습"
      - "비지도 군집화만 사용"
    answer: "2"
    explanation: "라벨 없는 대규모 분자 코퍼스에서 마스킹 등 자기 자신을 예측하도록 사전학습(SSL)한 뒤, 적은 라벨로 지도학습 미세조정하는 pretrain–finetune 전략입니다. 라벨 비용이 큰 신약개발에서 표준 접근입니다."

  - id: "w1q3"
    question: "분자의 원자-결합 그래프 구조를 그대로 입력받아 이웃 원자 간 메시지를 전달하며 학습하는 딥러닝 아키텍처는?"
    type: "multiple_choice"
    options:
      - "CNN (합성곱 신경망)"
      - "RNN/LSTM"
      - "GNN (그래프 신경망)"
      - "MLP (다층 퍼셉트론)"
    answer: "2"
    explanation: "GNN은 노드(원자)와 엣지(결합)로 표현된 분자 그래프에서 이웃 원자의 정보를 모으는 message passing으로 학습합니다. CNN은 그리드 이미지, RNN은 시퀀스, MLP는 고정 길이 벡터에 적합합니다."

  - id: "w1q4"
    question: "딥러닝 학습 루프의 4단계 순서로 올바른 것은?"
    type: "multiple_choice"
    options:
      - "Forward → Loss 계산 → Backward → 파라미터 갱신"
      - "Backward → Forward → Loss 계산 → 파라미터 갱신"
      - "Loss 계산 → Forward → 파라미터 갱신 → Backward"
      - "파라미터 갱신 → Forward → Backward → Loss 계산"
    answer: "0"
    explanation: "입력을 흘려 예측을 만들고(Forward), 정답과 비교해 손실을 계산하고(Loss), 미분 연쇄법칙으로 기울기를 거슬러 올리고(Backward), 그 기울기로 가중치를 업데이트(Update)합니다."

  - id: "w1q5"
    question: "동일 모델이 random split에서는 ROC-AUC 0.90, scaffold split에서는 0.72를 기록했습니다. 신약 탐색에서 어떤 결과를 더 신뢰해야 하는가?"
    type: "multiple_choice"
    options:
      - "random split 결과 — 분할이 균등하므로 더 객관적"
      - "scaffold split 결과 — 처음 보는 분자 골격으로의 외삽 능력을 반영"
      - "두 결과의 평균"
      - "데이터가 클수록 random이 좋으므로 random split"
    answer: "1"
    explanation: "약물 탐색은 본질적으로 신규 scaffold로의 외삽 문제이므로, random split은 같은 골격이 train/test에 섞여 성능을 과대평가합니다. scaffold split이 임상 현실에 가깝습니다."

  - id: "w1q6"
    question: "hERG 차단 분류 모델을 만들 때 위음성(차단을 놓침)이 후기 임상에서 QT 연장으로 개발 중단을 부를 수 있어 임상적 비용이 비대칭적으로 큽니다. 손실 함수로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "단순 MSE"
      - "단순 BCE (가중치 없음)"
      - "양성 클래스에 가중을 둔 BCE 또는 Focal Loss"
      - "Contrastive Loss"
    answer: "2"
    explanation: "위음성과 위양성의 임상적 비용이 비대칭일 때는 양성 클래스 가중 BCE 또는 Focal Loss로 비용 비대칭을 명시적으로 반영해야 합니다. 단순 BCE는 클래스 불균형 시 다수 클래스에 끌립니다."

  - id: "w1q7"
    question: "강화학습 기반 분자 생성에서 '보상 해킹(reward hacking)'을 가장 효과적으로 줄이는 약학적 개입은?"
    type: "multiple_choice"
    options:
      - "보상에서 활성 점수 가중치를 더 높게 둔다"
      - "에이전트의 학습률을 낮춘다"
      - "합성 가능성(SAscore)·QED·ADMET 필터를 보상에 결합한 MPO를 설계한다"
      - "옵티마이저를 SGD에서 Adam으로 바꾼다"
    answer: "2"
    explanation: "보상 해킹은 모델이 활성 점수만 극대화하는 비현실적 분자를 만드는 현상입니다. 합성 가능성·약물 유사성·ADMET 필터를 결합한 다중 파라미터 보상이 약학적으로 합리적인 분자로 정책을 끌어옵니다."

  - id: "w1q8"
    question: "약학 전공자가 모델러 대비 가장 차별적으로 기여할 수 있는 결정 영역은?"
    type: "multiple_choice"
    options:
      - "옵티마이저 종류와 학습률 선택"
      - "정규화 기법(BatchNorm vs LayerNorm) 선택"
      - "문제 정의·임상 비대칭 반영·분할/평가 프로토콜 결정"
      - "GPU 메모리 최적화"
    answer: "2"
    explanation: "옵티마이저·정규화·메모리 최적화는 모델러나 도구에 위임 가능한 영역입니다. 임상 의사결정 맥락에서 무엇을 어떻게 평가할지 정의하는 것이 약학 전공자의 핵심 차별점입니다."

  - id: "w1q9"
    question: "Insilico Medicine의 INS018_055 사례에서 타겟 발굴부터 임상 Phase II 진입까지 약 30개월이 걸렸습니다. 이 사례가 시사하는 가장 핵심적인 교훈은?"
    type: "multiple_choice"
    options:
      - "단일 알고리즘만 잘 쓰면 신약개발이 빨라진다"
      - "AI는 아직 신약개발에 의미 있는 가속을 주지 못한다"
      - "SSL 사전학습·지도학습 예측·강화학습 생성을 결합한 통합 파이프라인이 실제 임상 진입 시간을 단축할 수 있다"
      - "AI는 타겟 발굴까지만 유용하고 후보 도출에는 효과가 없다"
    answer: "2"
    explanation: "Pharma.AI는 세 패러다임(SSL·지도·강화)을 한 파이프라인에 통합한 사례로, 단일 기술이 아니라 Week 1에서 본 기술 지도의 통합 운영이 가속의 핵심 동인이라는 점을 보여줍니다."

  - id: "w1q10"
    question: "약학 전공 창업자가 AI 신약개발 SaaS의 차별화 포인트(moat)로 가장 합리적으로 강조할 수 있는 것은?"
    type: "multiple_choice"
    options:
      - "최신 GPU와 빠른 학습 속도"
      - "더 큰 모델 파라미터 수"
      - "scaffold/temporal 분할·임상 비대칭 손실·AD/불확실성 보고를 강제하는 평가 프로토콜과 도메인 신뢰성"
      - "오픈소스 라이브러리의 폭넓은 사용"
    answer: "2"
    explanation: "GPU·모델 크기·오픈소스 사용은 누구나 모방 가능합니다. 약학 지식이 직접 들어간 평가·검증·신뢰성 프로토콜은 비약학 전공 경쟁자가 모방하기 어려운 도메인 특화 해자입니다."
