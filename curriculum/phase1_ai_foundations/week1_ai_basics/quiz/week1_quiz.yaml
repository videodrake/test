title: "Week 1: AI/ML 핵심 개념 퀴즈"
description: "Day 1~5에서 다룬 AI/ML/DL 위계, 학습 패러다임, 신경망 아키텍처, 학습 루프 핵심 개념을 점검합니다. 약학 전공자의 풀스택 판단력 관점에서 출제했습니다."
questions:
  - id: "w1q1"
    question: "AI · 머신러닝(ML) · 딥러닝(DL)의 관계로 가장 정확한 것은?"
    type: "multiple_choice"
    options:
      - "AI ⊂ ML ⊂ DL — DL이 가장 큰 개념이다"
      - "DL ⊂ ML ⊂ AI — DL은 ML의 한 갈래이며 ML은 AI의 하위 분야다"
      - "ML과 DL은 별개의 분야이며 AI와 무관하다"
      - "AI는 규칙 기반만 의미하며 ML/DL과 분리된다"
    answer: "1"
    explanation: "AI가 가장 넓은 개념이고, 데이터로부터 패턴을 학습하는 ML이 그 하위 분야이며, 다층 신경망을 사용하는 DL은 ML의 하위 분야입니다(Day 1)."

  - id: "w1q2"
    question: "다음 중 '자기지도학습(SSL, self-supervised learning)'에 해당하는 사례로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "IC50 라벨이 짝지어진 화합물 1만 건으로 회귀 모델을 학습"
      - "SMILES의 일부 토큰을 가리고 그 토큰을 예측하도록 학습한 ChemBERTa"
      - "분자를 한 토큰씩 생성하면서 합성 가능성 보상으로 정책을 갱신"
      - "화합물 활성-비활성 라벨로 분류기를 학습한 hERG 모델"
    answer: "1"
    explanation: "SSL은 라벨 없이 입력의 일부를 가리고 그 부분을 예측하도록 만드는 학습 방식입니다(Day 2). 1번은 지도학습, 3번은 강화학습, 4번은 지도학습입니다."

  - id: "w1q3"
    question: "보편 근사 정리(Universal Approximation Theorem)가 의미하는 바로 가장 정확한 것은?"
    type: "multiple_choice"
    options:
      - "충분히 많은 뉴런의 2층 MLP가 임의 연속 함수를 원하는 정밀도로 근사할 수 있다"
      - "딥러닝 모델은 항상 얕은 모델보다 적은 데이터로 학습된다"
      - "Transformer만이 모든 비선형 함수를 근사할 수 있다"
      - "신경망은 데이터가 무한히 있으면 100% 정확도에 도달한다"
    answer: "0"
    explanation: "Cybenko(1989), Hornik의 정리는 충분한 폭의 2층 MLP가 임의 연속 함수의 근사기임을 보장합니다(Day 3). 다만 실무적으로는 깊은 망이 더 적은 파라미터로 같은 함수를 표현합니다."

  - id: "w1q4"
    question: "MoleculeNet 등 벤치마크에서 random split과 scaffold split으로 평가한 동일 모델의 ROC-AUC가 크게 차이 나는 이유로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "scaffold split은 무작위성이 더 커서 평균이 떨어진다"
      - "random split은 같은 골격(scaffold)의 유사 분자가 train과 test에 섞여 외삽 능력이 과대평가된다"
      - "scaffold split은 데이터 양이 줄어들어 성능이 항상 낮다"
      - "random split이 임상 환경을 더 잘 반영한다"
    answer: "1"
    explanation: "약물 탐색은 본질적으로 처음 보는 골격으로의 외삽 문제이며, scaffold split이 이를 더 정직하게 평가합니다(Day 4). random split은 라벨 누출과 유사한 효과로 성능을 부풀립니다."

  - id: "w1q5"
    question: "hERG 차단 분류 모델을 설계할 때, 양성(차단)을 놓치는 위음성이 임상 후기 단계에서 QT 연장으로 인한 개발 중단을 초래할 수 있다는 약학적 이해를 반영하려면 어떤 손실함수가 가장 합리적인가?"
    type: "multiple_choice"
    options:
      - "단순 MSE — 회귀 표준 손실"
      - "단순 BCE — 이진 분류 표준 손실"
      - "양성 클래스 가중치를 둔 가중 BCE 또는 Focal Loss"
      - "InfoNCE — 표현 학습 손실"
    answer: "2"
    explanation: "위음성과 위양성의 비용이 비대칭이고, 양성 클래스가 보통 소수이므로, 가중 BCE 또는 어려운 양성 샘플에 가중치를 주는 Focal Loss가 적합합니다(Day 4)."

  - id: "w1q6"
    question: "다음 신약개발 문제와 가장 자연스럽게 대응되는 학습 패러다임의 짝짓기로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "ChEMBL 240만 무라벨 분자 표현 사전학습 → 강화학습"
      - "다중 물성을 동시에 만족시키는 분자 생성 → 비지도학습"
      - "IC50 활성 라벨이 충분한 표적 → 지도학습"
      - "임상 환자 군집화 → 지도학습"
    answer: "2"
    explanation: "라벨이 짝지어진 회귀 문제는 지도학습의 정의 그 자체입니다(Day 2). 무라벨 표현 학습은 비지도/SSL, 다중 보상 분자 생성은 강화학습, 환자 군집화는 비지도가 자연스럽습니다."

  - id: "w1q7"
    question: "신약개발에서 작은 데이터셋(예: 표적당 라벨 1,000건 미만)일 때 과적합 위험을 줄이기 위한 조치로 가장 부적절한 것은?"
    type: "multiple_choice"
    options:
      - "Dropout과 weight decay를 함께 사용"
      - "검증 손실 기반 조기 종료(early stopping) 적용"
      - "단일 시드 1회 결과만 보고하고 그 값을 최종 성능으로 채택"
      - "scaffold split 또는 시간 기반 분할로 평가"
    answer: "2"
    explanation: "단일 시드 결과는 분산이 커서 신뢰할 수 없습니다(Day 4). 5 시드 평균과 분산을 함께 보고해야 일반화 능력을 정직하게 평가할 수 있습니다."

  - id: "w1q8"
    question: "AI 신약개발 SaaS를 기획할 때, 약학 전공자가 비전공 ML 엔지니어 대비 가장 차별적 가치를 발휘할 수 있는 모듈은?"
    type: "multiple_choice"
    options:
      - "GPU 인프라 최적화"
      - "임상적 의사결정 맥락을 반영한 평가·신뢰(Eval/Trust) 프로토콜 설계"
      - "Transformer 사전학습 코드 최적화"
      - "분산 학습 프레임워크 선택"
    answer: "1"
    explanation: "패러다임·아키텍처·손실·평가의 4모듈 중 임상 게이트(Lipinski, hERG, BBB 등)와 의사결정 비용 비대칭을 모델 평가 기준으로 번역하는 일은 약학 지식이 직접 경쟁력이 되는 영역입니다(Day 5)."

  - id: "w1q9"
    question: "다음 중 'AI 신약개발 회사의 결과를 의심해야 할 신호'로 가장 약한 것(즉, 의심 근거가 되기 어려운 것)은?"
    type: "multiple_choice"
    options:
      - "ROC-AUC 0.95를 보고하면서 random split만 사용"
      - "단일 시드 결과만 제시"
      - "예측에 불확실성·적용 영역(AD)을 함께 보고"
      - "데이터 정제(중복 제거·tautomer 표준화) 절차를 명시하지 않음"
    answer: "2"
    explanation: "불확실성·AD를 함께 보고하는 것은 오히려 신뢰도의 신호입니다(Day 4, Day 5). 나머지는 모두 결과를 부풀리거나 재현이 어려워질 수 있는 의심 신호입니다."

  - id: "w1q10"
    question: "AlphaFold 2와 Insilico Medicine의 INS018_055 사례를 Week 1의 4축 격자(패러다임·아키텍처·손실·데이터 전략)로 비교할 때 공통적으로 도출되는 시사점으로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "두 사례 모두 사람이 만든 규칙 기반 점수를 그대로 사용한다"
      - "두 사례 모두 데이터 자체로 표현·평가 함수를 학습하고, 손실/보상 설계가 약학적 결정과 직결된다"
      - "두 사례 모두 강화학습만으로 결과를 얻었다"
      - "두 사례 모두 라벨 없이 비지도학습만으로 임상 후보까지 도달했다"
    answer: "1"
    explanation: "두 사례 모두 사전학습/표현 학습과 도메인 적합 손실(또는 다중 보상)을 결합한 데이터 기반 접근의 산물이며, 손실/보상 설계의 약학적 정합성이 핵심 차별점입니다(Day 5)."
