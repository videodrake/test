title: "Week 1: AI/ML 핵심 개념 퀴즈"
description: "Day 1~5에서 다룬 AI·ML·DL의 위계, 세 학습 패러다임, 신경망 아키텍처, 학습 루프(데이터·손실·최적화), Week 1 종합 매핑을 점검합니다."
questions:
  - id: "w1q1"
    question: "AI, 머신러닝(ML), 딥러닝(DL)의 포함 관계로 가장 정확한 것은?"
    type: "multiple_choice"
    options:
      - "ML ⊃ AI ⊃ DL"
      - "AI ⊃ ML ⊃ DL"
      - "DL ⊃ ML ⊃ AI"
      - "AI = ML, DL은 별개"
    answer: "1"
    explanation: "AI가 가장 넓은 개념(규칙 기반 포함)이고, 그 안에 데이터로 함수를 학습하는 ML이 있으며, 다층 신경망을 사용하는 DL은 ML의 하위 분야입니다."

  - id: "w1q2"
    question: "라벨이 약 240만 건의 ChEMBL 무라벨 분자 코퍼스로 사전학습 후, 1만 건 hERG 라벨로 미세조정하는 전략에 가장 적합한 패러다임 조합은?"
    type: "multiple_choice"
    options:
      - "지도학습 단독"
      - "강화학습 단독"
      - "자기지도학습(SSL) + 지도학습 미세조정"
      - "비지도 군집화만"
    answer: "2"
    explanation: "라벨이 부족할 때 무라벨 데이터로 표현을 사전학습한 뒤 라벨로 미세조정하는 SSL+finetune이 라벨 효율성을 극대화합니다. ChemBERTa·MolFormer 등이 같은 전략을 사용합니다."

  - id: "w1q3"
    question: "딥러닝에서 '활성화 함수(activation function)'가 비선형이어야 하는 가장 본질적인 이유는?"
    type: "multiple_choice"
    options:
      - "기울기를 빠르게 만들기 위해"
      - "선형 활성화만 쓰면 층을 아무리 쌓아도 단일 선형 변환과 동일하기 때문"
      - "출력을 0~1로 만들기 위해"
      - "과적합을 줄이기 위해"
    answer: "1"
    explanation: "비선형성이 없으면 다층 구조의 표현력이 1층과 같아집니다. ReLU·GELU 등의 비선형 활성화가 깊이의 의미를 만듭니다."

  - id: "w1q4"
    question: "딥러닝 학습 루프의 4단계를 올바른 순서로 나열한 것은?"
    type: "multiple_choice"
    options:
      - "forward → loss → backward → 파라미터 갱신"
      - "loss → forward → 파라미터 갱신 → backward"
      - "backward → forward → loss → 파라미터 갱신"
      - "파라미터 갱신 → forward → backward → loss"
    answer: "0"
    explanation: "예측(forward) → 손실 계산 → 역전파로 기울기 산출(backward) → 옵티마이저로 가중치 갱신의 순서가 모든 딥러닝의 표준 루프입니다."

  - id: "w1q5"
    question: "신약 탐색 모델 평가에서 '스캐폴드 분할(scaffold split)'을 random split보다 권장하는 이유로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "계산 비용이 적게 들기 때문"
      - "데이터를 더 많이 사용할 수 있기 때문"
      - "약물 탐색은 본질적으로 신규 scaffold로의 외삽이며, scaffold split이 그 일반화 능력을 측정하기 때문"
      - "정답이 더 잘 맞기 때문"
    answer: "2"
    explanation: "random split은 유사 scaffold가 train/test에 섞여 성능을 과대평가합니다. 신규 화학공간 외삽 능력을 측정하려면 scaffold(또는 temporal) split이 임상 현실에 부합합니다."

  - id: "w1q6"
    question: "hERG 차단 분류 모델에서 양성 클래스가 10%로 불균형이고 위음성의 임상 비용이 훨씬 큰 상황에 가장 합리적인 손실 설계는?"
    type: "multiple_choice"
    options:
      - "단순 MSE"
      - "양성 가중 BCE 또는 Focal Loss"
      - "Contrastive Loss"
      - "Categorical Cross-Entropy"
    answer: "1"
    explanation: "클래스 불균형 + 비대칭 비용에는 양성 가중 BCE나 Focal Loss가 표준입니다. MSE는 회귀용이고, Contrastive는 표현학습, Categorical CE는 다중 분류 기본 손실입니다."

  - id: "w1q7"
    question: "Insilico Medicine의 GENTRL(2019, *Nature Biotechnology*) 사례에서 RL 보상 함수가 활성 점수만으로 구성될 때 발생하는 대표적 실패는?"
    type: "multiple_choice"
    options:
      - "기울기 소실"
      - "보상 해킹(reward hacking) — 합성 불가능하거나 hERG 차단성 분자가 양산됨"
      - "과소적합"
      - "모드 붕괴(mode collapse)"
    answer: "1"
    explanation: "보상이 협소하면 모델은 그 지표만 최대화하는 비현실적 분자를 생성합니다. 합성 가능성(SAscore), QED, ADMET 필터를 보상에 결합한 다중 파라미터 최적화가 필수입니다."

  - id: "w1q8"
    question: "단백질-리간드 복합체 구조를 단일 네트워크로 예측하는 2024년 발표 모델은?"
    type: "multiple_choice"
    options:
      - "AlphaFold 2"
      - "AlphaFold 3"
      - "ESM-2"
      - "MolFormer-XL"
    answer: "1"
    explanation: "Abramson et al. (2024, *Nature*)의 AlphaFold 3는 Pairformer + 확산 모델 구조로 단백질·리간드·핵산·이온 복합체를 통합 예측합니다. AF2는 단백질 단독 구조, ESM-2는 단백질 언어 모델, MolFormer는 분자 사전학습 모델입니다."

  - id: "w1q9"
    question: "약학 전공자가 AI 신약개발 스타트업에서 가장 명확한 차별적 가치를 제공할 수 있는 레이어는?"
    type: "multiple_choice"
    options:
      - "GNN 아키텍처를 더 깊게 쌓는 일"
      - "옵티마이저 알고리즘 개발"
      - "임상 의사결정 맥락에 맞춘 평가·해석·보상 설계(모델 신뢰성 레이어)"
      - "분산 학습 인프라 구축"
    answer: "2"
    explanation: "모델 자체는 상품화되어 누구나 쓸 수 있게 됩니다. 임상적 비용 비대칭, 분할 기준, 불확실성 해석, 보상 함수 설계 등 약학 지식이 직접 기여하는 신뢰성 레이어가 약학 전공자의 차별점입니다."

  - id: "w1q10"
    question: "AI 신약개발 SaaS의 핵심 가치 제안(value proposition)으로 약학 전공 창업자에게 가장 약한 차별화 주장은?"
    type: "multiple_choice"
    options:
      - "임상적 비용 비대칭을 반영한 손실·보상 설계"
      - "scaffold/temporal split 기반 검증된 외삽 성능 보고"
      - "단일 시드·random split의 ROC-AUC 0.95 라는 단일 수치"
      - "예측에 적용 영역(AD)과 불확실성을 동반"
    answer: "2"
    explanation: "단일 시드·random split의 단일 지표는 과대평가와 재현성 부족이 의심되므로 신뢰성 주장에 가장 취약합니다. 나머지 세 가지는 약학 전공자가 만들 수 있는 차별적 신뢰성 신호입니다."
