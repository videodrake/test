title: "Week 1: AI/ML 핵심 개념 퀴즈"
description: "AI·ML·DL의 위계, 머신러닝 패러다임, 신경망 아키텍처, 학습 원리를 통합적으로 점검합니다. 단순 암기보다는 신약개발 맥락에서의 판단 능력에 초점을 둡니다."
questions:
  - id: "w1q1"
    question: "AI, 머신러닝(ML), 딥러닝(DL)의 관계로 가장 정확한 것은?"
    type: "multiple_choice"
    options:
      - "AI ⊂ ML ⊂ DL — DL이 가장 넓고 AI는 그 부분집합이다"
      - "AI ⊃ ML ⊃ DL — DL은 ML의 한 갈래이고, ML은 AI의 한 갈래다"
      - "셋은 서로 다른 독립적 분야로, 교집합이 거의 없다"
      - "AI = ML = DL — 모두 같은 기술의 다른 이름이다"
    answer: "1"
    explanation: "AI는 가장 넓은 개념(규칙 기반 + 데이터 기반)이고, ML은 데이터에서 패턴을 학습하는 AI의 부분집합, DL은 다층 신경망을 사용하는 ML의 부분집합입니다."

  - id: "w1q2"
    question: "다음 중 '비지도학습(unsupervised learning)'에 가장 잘 해당하는 신약개발 시나리오는?"
    type: "multiple_choice"
    options:
      - "ChEMBL의 IC50 라벨을 사용해 pIC50 회귀 모델을 학습한다"
      - "라벨 없는 1억 개 SMILES로 분자 임베딩을 사전학습한다"
      - "여러 물성을 동시에 만족하는 분자를 보상 기반으로 생성한다"
      - "hERG 차단 여부를 0/1 라벨로 분류한다"
    answer: "1"
    explanation: "라벨 없이 분자 구조 자체의 패턴을 학습하는 사전학습은 자기지도/비지도 학습입니다. 1·4번은 지도학습, 3번은 강화학습입니다."

  - id: "w1q3"
    question: "분자 그래프(원자=노드, 결합=엣지)를 직접 입력으로 받는 데 가장 자연스러운 신경망 아키텍처는?"
    type: "multiple_choice"
    options:
      - "CNN (합성곱 신경망)"
      - "RNN/LSTM"
      - "GNN (그래프 신경망)"
      - "전통 MLP"
    answer: "2"
    explanation: "GNN은 노드 간 message passing으로 그래프 구조 정보를 보존하며 학습할 수 있어 분자 그래프에 가장 적합합니다. CNN은 격자 데이터, RNN은 순서 데이터에 특화됩니다."

  - id: "w1q4"
    question: "데이터 분할 방식에 대한 설명으로 가장 정확한 것은?"
    type: "multiple_choice"
    options:
      - "무작위 분할(random split)이 항상 가장 보수적인 평가를 제공한다"
      - "스캐폴드 분할(scaffold split)은 같은 분자 골격이 train과 test에 섞이지 않도록 해 외삽 능력을 측정한다"
      - "Test set은 하이퍼파라미터를 튜닝하는 용도다"
      - "신약개발에서는 분할 방식이 모델 성능에 거의 영향을 주지 않는다"
    answer: "1"
    explanation: "scaffold split은 Bemis-Murcko scaffold 단위로 분할해 신규 골격에 대한 외삽 성능을 평가합니다. random split은 정보 누출로 성능을 과대평가하기 쉽고, test set은 최종 평가용입니다."

  - id: "w1q5"
    question: "hERG 차단 분류 모델을 설계할 때, 양성(차단) 클래스가 약 10%로 불균형이고 위음성의 임상 비용이 위양성보다 훨씬 큰 상황입니다. 손실함수 선택으로 가장 합리적인 것은?"
    type: "multiple_choice"
    options:
      - "단순 평균 BCE를 그대로 사용한다 (불균형은 무시)"
      - "회귀 문제로 바꿔 MSE를 사용한다"
      - "양성 클래스에 가중치를 둔 BCE 또는 Focal Loss를 사용한다"
      - "Contrastive Loss로 표현 학습만 수행한다"
    answer: "2"
    explanation: "클래스 불균형 + 위음성 비용 우위 상황에서는 양성에 가중치를 두는 가중 BCE 또는 어려운 샘플에 집중하는 Focal Loss가 표준 선택입니다. 단순 BCE는 다수 클래스에 편향됩니다."

  - id: "w1q6"
    question: "라벨이 약 800개로 매우 적은 신규 표적의 활성 예측 모델을 만들어야 합니다. 가장 합리적인 1차 접근은?"
    type: "multiple_choice"
    options:
      - "수억 파라미터의 Transformer를 처음부터 학습한다"
      - "사전학습된 분자 모델(MolFormer, Uni-Mol 등)에서 미세조정하거나 RF/XGBoost를 우선 시도한다"
      - "데이터가 부족하니 비지도 군집화만 수행하고 라벨은 무시한다"
      - "강화학습으로 분자를 생성한다"
    answer: "1"
    explanation: "라벨 1천 미만이면 큰 모델의 직접 학습은 과적합 위험이 큽니다. 사전학습 + 미세조정 또는 전통 ML이 데이터 효율 면에서 우수합니다."

  - id: "w1q7"
    question: "약학 전공자가 AI 신약개발 워크플로우에서 가장 차별적으로 기여할 수 있는 단계는?"
    type: "multiple_choice"
    options:
      - "GPU 커널 최적화와 분산 학습 인프라"
      - "옵티마이저 알고리즘의 수학적 증명"
      - "임상 의사결정 맥락에서 출력 정의·임계값 설정·평가 지표 선택"
      - "웹 프론트엔드 디자인"
    answer: "2"
    explanation: "약학 지식은 임상 의사결정 맥락에서 무엇이 의미 있는 출력인지 정의하고, 손실/임계값/평가 지표 선택에 직접 작용합니다. 1·2·4번은 다른 전공자가 더 잘하는 영역입니다."

  - id: "w1q8"
    question: "AI 신약개발 SaaS 스타트업이 빅테크(예: AlphaFold/Isomorphic Labs)와 차별화하기 위한 가장 약한 전략은?"
    type: "multiple_choice"
    options:
      - "특정 적응증·표적 클래스에 특화한 도메인 데이터와 검증 프로토콜 구축"
      - "임상 의사결정 맥락에 맞춘 출력 통역과 워크플로우 통합"
      - "동일한 범용 단백질 구조 예측 모델을 더 큰 GPU로 재학습한다고 광고"
      - "약학 전공자만이 설계 가능한 임계값·우선순위 규칙을 제품화"
    answer: "2"
    explanation: "범용 모델을 단순히 더 크게 학습하는 전략은 자본력에서 빅테크에 밀립니다. 도메인 깊이·임상 통역·전문가 규칙이 스타트업의 해자가 됩니다."

  - id: "w1q9"
    question: "Insilico Medicine의 INS018_055 사례에서 핵심적으로 사용된 패러다임 조합으로 가장 정확한 것은?"
    type: "multiple_choice"
    options:
      - "오직 지도학습 한 가지만 사용했다"
      - "타겟 발굴(자기지도/그래프 임베딩) + 분자 생성(강화학습) + 임상 예측(지도)의 조합"
      - "규칙 기반 시스템만으로 후보를 발굴했다"
      - "강화학습은 사용하지 않고 무작위 탐색에 의존했다"
    answer: "1"
    explanation: "Insilico의 Pharma.AI는 PandaOmics(타겟 발굴)·Chemistry42(생성)·InClinico(임상 예측)를 결합한 다중 패러다임 통합으로, 단일 기술이 아닌 조합이 차별 포인트입니다."

  - id: "w1q10"
    question: "다음 중 약학 전공자가 라벨이 풍부한 ADMET 시장과 라벨이 희소한 희귀질환 타겟 시장에 진입할 때 가장 합리적인 차별 전략은?"
    type: "multiple_choice"
    options:
      - "두 시장 모두 동일한 모델·동일한 BM으로 접근한다"
      - "ADMET은 지도학습 기반 SaaS, 희귀질환은 사전학습+RL과 임상 통역 서비스로 분리 설계한다"
      - "ADMET 시장은 이미 포화이므로 무조건 피한다"
      - "희귀질환 시장은 데이터가 없으므로 AI를 적용하지 않는다"
    answer: "1"
    explanation: "데이터 가용성·시장 구조·임상 의사결정 맥락이 다르면 모델 패러다임과 BM도 달라야 합니다. 약학 전공자의 임상 통역은 두 영역 모두에서 차별 포인트가 되지만 적용 방식은 다릅니다."
