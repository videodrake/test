title: "Week 2: 신약개발 파이프라인과 AI 퀴즈"
description: "신약개발 파이프라인 5단계, 타겟 발굴, 히트·리드 최적화, 전임상·임상, 그리고 AI 신약개발 회사 지도를 종합 점검합니다."
questions:
  - id: "w2q1"
    question: "신약개발 파이프라인의 단계 순서를 가장 정확히 나열한 것은?"
    type: "multiple_choice"
    options:
      - "히트 발견 → 타겟 발굴 → 리드 최적화 → 임상 → 전임상"
      - "타겟 발굴 → 히트 발견 → 리드 최적화 → 전임상 → 임상"
      - "리드 최적화 → 타겟 발굴 → 히트 발견 → 전임상 → 임상"
      - "타겟 발굴 → 리드 최적화 → 히트 발견 → 임상 → 전임상"
    answer: "1"
    explanation: "표적(타겟)을 먼저 정하고, 그 표적에 작용하는 초기 활성물질(히트)을 찾은 뒤, 이를 다듬어(리드 최적화) 후보를 만들고, 전임상 안전성 검증을 거쳐 임상에 진입합니다."

  - id: "w2q2"
    question: "타겟의 'druggability(약물성)'가 의미하는 바로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "그 표적이 질병과 통계적으로 연관되어 있는 정도"
      - "그 표적이 약물(소분자·항체 등)로 의미 있게 조절될 수 있는 가능성"
      - "그 표적을 발현하는 환자의 수"
      - "그 표적에 대한 특허가 비어 있는 정도"
    answer: "1"
    explanation: "Druggability는 표적이 실제로 약물에 의해 조절(결합·억제·활성화)될 수 있는지를 뜻합니다. 질병 연관성(질병 관련성)이 높아도 druggable하지 않으면 약으로 이어지기 어렵습니다."

  - id: "w2q3"
    question: "신약개발에서 '히트(hit)'와 '리드(lead)'의 차이를 가장 정확히 설명한 것은?"
    type: "multiple_choice"
    options:
      - "히트와 리드는 같은 의미로 호환해 쓴다"
      - "히트는 초기 활성이 확인된 물질, 리드는 활성·선택성·물성을 다듬어 개발 가능성을 높인 물질"
      - "히트는 임상 후보, 리드는 시판 약물이다"
      - "히트는 항체, 리드는 소분자를 가리킨다"
    answer: "1"
    explanation: "히트는 스크리닝에서 활성이 처음 확인된 물질이고, 리드는 활성·선택성·ADMET 등을 최적화해 임상 후보로 발전시킬 수 있게 다듬은 물질입니다."

  - id: "w2q4"
    question: "전임상에서 도출되는 NOAEL(무독성량)의 임상적 쓰임으로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "약물의 시판 가격 산정 근거"
      - "Phase III 환자 수 결정"
      - "동물 NOAEL을 안전계수와 함께 인간 첫 투여(FIH) 용량 산정에 활용"
      - "특허 만료 시점 예측"
    answer: "2"
    explanation: "GLP 독성시험에서 얻은 NOAEL은 allometric scaling과 안전계수를 거쳐 인간 첫 투여(FIH) 용량 산정의 기반이 됩니다. MABEL 접근과 함께 임상 첫 용량을 보수적으로 정합니다."

  - id: "w2q5"
    question: "임상 실패 원인 분포를 보면 가장 큰 단일 원인이 '효능 부족'입니다(약 40~50%). 이 사실이 AI 투자 우선순위에 주는 함의로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "합성 비용 절감 AI에 우선 투자해야 한다"
      - "표적 가설 검증과 효능 가능성이 큰 환자 선별(바이오마커)에 AI를 우선 투자할 가치가 크다"
      - "포장·유통 자동화 AI가 가장 ROI가 크다"
      - "효능은 AI로 다룰 수 없으므로 안전성 예측에만 집중해야 한다"
    answer: "1"
    explanation: "효능 실패가 최대 단일 원인이므로, 표적 적합 환자를 선별하고 표적 가설을 정밀화하는 AI(바이오마커·환자 선별)의 기대 ROI가 큽니다. 약학 전공자의 기전·바이오마커 판단이 직접 기여합니다."

  - id: "w2q6"
    question: "표적 단백질의 고해상도 3D 구조가 확보된 상황에서 히트를 찾으려 합니다. 가장 적합한 가상 스크리닝 접근은?"
    type: "multiple_choice"
    options:
      - "리간드 기반(ligand-based) 유사도 검색만 사용한다"
      - "구조 기반(structure-based) 도킹을 활용해 결합 포즈·친화도를 평가한다"
      - "구조 정보는 스크리닝에 쓸 수 없으므로 무작위 선택한다"
      - "임상 데이터만으로 히트를 결정한다"
    answer: "1"
    explanation: "표적 구조가 있으면 구조 기반 도킹으로 화합물의 결합 양상을 직접 평가할 수 있어 효율적입니다. 리간드 기반은 알려진 활성 분자는 있으나 구조가 없을 때 유용합니다."

  - id: "w2q7"
    question: "임상시험에서 digital twin(합성 대조군)을 도입해 위약군 규모를 줄이려 합니다. 약학 전공 창업자가 가장 먼저 검증해야 할 것은?"
    type: "multiple_choice"
    options:
      - "모델이 사용하는 GPU의 종류"
      - "외부 데이터의 selection bias, endpoint 정의·측정 주기·집단 특성의 정합성"
      - "회사의 마케팅 슬로건"
      - "예측 모델의 학습 속도"
    answer: "1"
    explanation: "합성 대조군의 핵심 위험은 외부 데이터의 선택 편향과 시간 효과, endpoint·집단 정합성입니다. 이는 historical control의 고전적 한계와 같으며 약학 전공자가 검증할 수 있는 영역입니다."

  - id: "w2q8"
    question: "한 회사가 제약사에 계산 소프트웨어를 라이선스로 판매하면서 동시에 자체 신약 파이프라인도 보유하고 있습니다. 회사 지도상 이 회사의 비즈니스 모델은?"
    type: "multiple_choice"
    options:
      - "순수 단일 모듈 전문 도구"
      - "소프트웨어 매출의 안정성과 자체 자산의 상방을 함께 추구하는 하이브리드"
      - "수익 모델이 없는 비영리 컨소시엄"
      - "임상시험 위탁(CRO) 전업"
    answer: "1"
    explanation: "소프트웨어 라이선스(안정적 현금흐름)와 자체 파이프라인(높은 상방·높은 위험)을 결합한 하이브리드 모델입니다. Schrödinger가 대표 사례이며, 위험-보상 프로파일을 분산합니다."

  - id: "w2q9"
    question: "AI 신약개발 회사에서 '독점 데이터(데이터 모트)'가 모델 아키텍처보다 더 강한 해자로 평가되는 이유로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "데이터는 항상 모델보다 용량이 작기 때문"
      - "모델 구조는 논문으로 공개되어 모방 가능하지만, 자체 생성한 독점 데이터는 모방·복제가 어렵기 때문"
      - "데이터는 규제 대상이 아니기 때문"
      - "데이터가 있으면 임상시험이 면제되기 때문"
    answer: "1"
    explanation: "최신 모델 아키텍처는 대부분 공개·재현 가능하지만, 자체 wet lab·임상에서 생성한 대규모 독점 데이터(예: phenomics)는 경쟁사가 단기간에 복제하기 어려워 지속적 해자가 됩니다."

  - id: "w2q10"
    question: "약학 전공 풀스택 창업자가 1년 내 MVP로 진입할 출발 좌표를 정할 때, 회사 지도상 가장 현실적인 선택은?"
    type: "multiple_choice"
    options:
      - "타겟부터 임상까지 모두 다루는 풀스택 AI 바이오텍을 곧바로 구축한다"
      - "막대한 임상 자본이 필요한 자체 파이프라인 회사로 시작한다"
      - "파이프라인 한 단계에 집중하는 단일 모듈 도구에서 약학적 의사결정 품질로 차별화한다"
      - "데이터·기술 없이 투자 유치부터 시도한다"
    answer: "2"
    explanation: "풀스택·자체 파이프라인은 막대한 자본과 임상 위험을 동반합니다. 약학 전공자는 특정 단계(예: 적응증별 ADMET·환자 선별)에 집중해 임상적 판단 품질로 차별화하는 단일 모듈 진입이 현실적입니다."
