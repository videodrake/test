title: "Week 4: 데이터와 평가 — AI 신약개발의 기반 퀴즈"
description: "ChEMBL/PDB/ZINC 데이터베이스, 분자 표준화·split·누출 점검, 평가 지표(AUROC·AUPRC·EF·Calibration), 그리고 MoleculeNet·TDC·Polaris 벤치마크까지 Phase 1의 데이터·평가 기반을 종합 점검합니다."
questions:
  - id: "w4q1"
    question: "약리 활성 학습용 데이터셋의 표준 원천으로 ChEMBL이 가장 적합한 이유로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "ChEMBL은 단백질 3D 구조를 가장 많이 보유한 DB이기 때문"
      - "ChEMBL은 문헌에서 정제된 약 240만 개 화합물과 약 2,000만 개 활성 측정치를 표적·어세이 메타데이터와 함께 제공하기 때문"
      - "ChEMBL은 구매 가능한 화합물 라이브러리이기 때문"
      - "ChEMBL은 LLM이 가장 잘 이해하는 형식이기 때문"
    answer: "1"
    explanation: "ChEMBL은 EMBL-EBI가 운영하는 공공 약리학 DB로, 표적·어세이·활성값까지 정제된 메타데이터를 제공해 약리 활성 학습의 표준이 됩니다. PDB는 단백질 구조, ZINC는 구매 가능 라이브러리를 담당합니다."

  - id: "w4q2"
    question: "분자 데이터 전처리에서 'InChIKey 기반 중복 제거'를 표준화의 첫 단계로 권장하는 이유는?"
    type: "multiple_choice"
    options:
      - "InChIKey가 가장 짧은 표현이기 때문"
      - "같은 분자가 여러 SMILES·염·이성질체로 저장되어 있을 때 InChIKey가 입체화학을 포함한 정규화된 식별자를 제공하기 때문"
      - "InChIKey가 분자량을 자동 계산하기 때문"
      - "InChIKey가 GNN 학습에 직접 입력으로 쓰이기 때문"
    answer: "1"
    explanation: "InChIKey는 IUPAC 표준 식별자로, 같은 분자의 다양한 SMILES 표기를 정규화해 중복을 정확히 잡습니다. ChEMBL·ZINC 합치기, train/test 누출 점검의 표준 1차 절차입니다."

  - id: "w4q3"
    question: "분자 활성 회귀에서 흔히 사용되는 'IC50 검열(censored) 데이터'에 대한 올바른 처리는?"
    type: "multiple_choice"
    options:
      - "검열 값은 모두 버린다"
      - "검열 표기(> 또는 <)를 무시하고 수치만 사용한다"
      - "검열 상한(예: > 30 µM)을 30 µM로 그대로 회귀에 넣으면 회귀 곡선을 왜곡하므로 censored regression 또는 분류 변환을 고려한다"
      - "검열 값은 모두 0으로 대체한다"
    answer: "2"
    explanation: "검열은 어세이 측정 한계를 의미하며, 그대로 수치화하면 활성·비활성 분포 모두를 왜곡합니다. 약학적으로 익숙한 right-censoring 처리 또는 분류 변환이 표준이며, Phase I 임상의 검열 데이터 처리 원리와 동일합니다."

  - id: "w4q4"
    question: "AUROC와 AUPRC 중 'PCBA처럼 양성:음성 = 1:100 이상으로 극단적 불균형인 분류 과제'에서 더 신뢰할 수 있는 지표는?"
    type: "multiple_choice"
    options:
      - "AUROC — 라벨 분포 무관하게 항상 안정적"
      - "AUPRC — 음성이 압도적으로 많을 때 AUROC가 과대평가되므로 양성 클래스에 집중하는 AUPRC가 실전 우선순위 결정에 더 가깝다"
      - "Accuracy — 단순하고 직관적"
      - "F1 — 임계값과 무관해 가장 안전"
    answer: "1"
    explanation: "극단적 불균형 분류에서 AUROC는 다수 음성의 영향으로 과대평가되기 쉽습니다. AUPRC는 양성 클래스의 precision-recall을 직접 측정해 가상 스크리닝 같은 우선순위 결정과 정렬됩니다."

  - id: "w4q5"
    question: "신약 가상 스크리닝의 평가에서 'Enrichment Factor(EF@1%)'가 AUROC보다 더 임상·산업적으로 의미있는 경우는?"
    type: "multiple_choice"
    options:
      - "데이터가 균형 잡혀 있고 전체 후보를 모두 합성할 수 있을 때"
      - "수십억 화합물 중 상위 1%만 실험적으로 검증할 자원이 있을 때, 상위 1%의 진양성 농축률이 실제 의사결정 기준이기 때문"
      - "모델이 회귀 출력만 제공할 때"
      - "데이터 라벨이 0/1이 아닐 때"
    answer: "1"
    explanation: "EF@K%는 상위 K% 후보의 진양성 농축률로, 자원이 제한된 실험 검증 시 가장 실전적 지표입니다. 전체 곡선을 보는 AUROC보다 '실제로 합성할 후보 N개의 품질'을 직접 평가합니다."

  - id: "w4q6"
    question: "분자 모델 평가에서 'Calibration(보정)'을 함께 보는 이유로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "Calibration은 학습 속도를 측정한다"
      - "AUROC가 같아도 예측 확률이 실제 빈도와 어긋나면 임상적 의사결정(예: 0.8 확신 → 실험)이 신뢰할 수 없게 되므로 임상 통합 모델은 보정이 필수이다"
      - "Calibration이 GPU 메모리를 절약한다"
      - "Calibration은 모델 학습 후 자동으로 만족된다"
    answer: "1"
    explanation: "Calibration은 예측 확률과 실제 양성 빈도의 일치도를 의미합니다. 임상 결정에 AI 출력을 직접 사용하려면 보정된 확률이 필요하며, AUROC 순위에는 영향이 없는 별개의 품질 차원입니다."

  - id: "w4q7"
    question: "MoleculeNet의 BBBP 데이터셋에서 'train과 test에 사실상 같은 분자가 다른 SMILES로 동시에 존재'하는 데이터 누출이 발견된 사례의 본질적 시사점은?"
    type: "multiple_choice"
    options:
      - "MoleculeNet은 더 이상 사용할 가치가 없다"
      - "학술 SOTA 차이의 상당 부분이 모델 우월성이 아니라 데이터 누출 정도의 차이에서 발생할 수 있으므로, 누출 점검과 정제 후 재평가가 표준 절차가 되어야 한다"
      - "BBBP는 임상적으로 의미가 없다"
      - "BBB 예측 자체가 불가능하다"
    answer: "1"
    explanation: "Pat Walters의 분석은 누출 정제 후 모델 AUROC가 0.03~0.05 하락함을 보였습니다. 빅파마 실사는 누출 재검사를 표준 절차로 도입했으며, Polaris의 출범 동기 중 하나입니다."

  - id: "w4q8"
    question: "TDC ADMET Benchmark Group의 평가 결과에서 '단일 모델이 모든 ADMET 과제에서 우월하지 않다'는 관찰의 사업적 함의는?"
    type: "multiple_choice"
    options:
      - "ADMET 예측 자체가 무용하다"
      - "단일 universal ADMET 모델은 환상이며, ADMET 카테고리별 전문 모델 포트폴리오가 더 합리적이다"
      - "TDC를 신뢰할 수 없다"
      - "ChemProp가 모든 과제에서 SOTA이다"
    answer: "1"
    explanation: "BBB·hERG·CYP·Clearance 등 ADMET 하위 영역은 분자 특성·메커니즘이 달라 단일 모델이 모두를 지배하기 어렵습니다. 약학 전공자는 표적·약물군별 우선순위로 포트폴리오를 설계할 수 있어 차별점이 됩니다."

  - id: "w4q9"
    question: "Polaris가 'cloud-based evaluation, test set 비공개'를 도입한 본질적 이유는?"
    type: "multiple_choice"
    options:
      - "테스트셋 다운로드 트래픽을 줄이기 위해"
      - "학술 모델 개발자가 부지불식간에 test set에 과적합하는 것을 구조적으로 차단해, 임상 시험의 이중 맹검과 동일한 원리로 평가 편향을 제거하기 위해"
      - "GPU 비용을 부과하기 위해"
      - "데이터 라이선스를 강화하기 위해"
    answer: "1"
    explanation: "Polaris는 평가자가 정답을 모르게 함으로써 사후 조정·누출을 차단합니다. 이는 임상의 이중 맹검과 동일한 통계적 원리이며, 약학 전공자에게 친숙한 편향 제거 메커니즘입니다."

  - id: "w4q10"
    question: "약학 전공 풀스택 창업자가 Phase 1 종료 시점에 ADMET 예측 SaaS의 마케팅·기술 백서에 사용할 '벤치마크 보고 정책'으로 가장 합리적인 첫 안은?"
    type: "multiple_choice"
    options:
      - "자체 데이터 SOTA AUROC만 보고하고 외부 비교는 생략한다"
      - "TDC ADMET Group의 권장 데이터셋·split·지표를 사용하고 5-seed 평균 ± SD, ChemProp·XGBoost baseline 비교, Tanimoto > 0.85 누출 점검까지 명시한다"
      - "MoleculeNet의 random split single seed 최고점을 보고한다"
      - "벤치마크는 보고하지 않고 자체 wet lab 결과만 강조한다"
    answer: "1"
    explanation: "빅파마 실사 통과 가능한 신뢰는 표준 벤치마크 + 통계 보고 + 누출 점검의 조합에서 나옵니다. 자체 SOTA 주장은 실사에서 가치를 거의 인정받지 못하며, 약학 전공자가 임상적으로 의미있는 데이터셋에 집중해 보고하는 것이 차별점이 됩니다."
