title: "Week 1: Python 과학 컴퓨팅 퀴즈"
description: "NumPy, Pandas, 시각화, 통계, 선형대수 기초를 점검합니다"

questions:
  - id: "w1q1"
    question: "NumPy의 벡터화(vectorization)가 Python 반복문보다 빠른 주된 이유는?"
    type: "multiple_choice"
    options:
      - "NumPy가 Python보다 새로운 언어이기 때문"
      - "NumPy가 C로 구현된 연속 메모리 배열 연산을 사용하기 때문"
      - "NumPy가 GPU를 자동으로 사용하기 때문"
      - "NumPy가 멀티스레딩을 항상 사용하기 때문"
    answer: "1"
    explanation: "NumPy는 C로 구현되어 있고, 연속된 메모리에 같은 타입의 데이터를 저장합니다. 이를 통해 CPU 캐시 효율성이 높아지고, SIMD 명령어를 활용할 수 있어 Python 반복문보다 훨씬 빠릅니다."

  - id: "w1q2"
    question: "Tanimoto 유사도의 값 범위는?"
    type: "multiple_choice"
    options:
      - "-1 에서 1"
      - "0 에서 1"
      - "0 에서 무한대"
      - "-무한대 에서 무한대"
    answer: "1"
    explanation: "Tanimoto 유사도는 교집합/합집합으로 계산되므로 항상 0(완전 다름)에서 1(동일) 사이의 값을 가집니다. 음수가 될 수 없습니다."

  - id: "w1q3"
    question: "Lipinski's Rule of Five에 포함되지 않는 기준은?"
    type: "multiple_choice"
    options:
      - "분자량(MW) <= 500"
      - "logP <= 5"
      - "TPSA <= 140"
      - "수소결합 공여체(HBD) <= 5"
    answer: "2"
    explanation: "Lipinski's Rule of Five는 MW<=500, logP<=5, HBD<=5, HBA<=10의 4가지 기준입니다. TPSA(위상 극성 표면적)는 Veber의 규칙에 포함되는 기준으로, Lipinski의 원래 Rule of Five에는 포함되지 않습니다."

  - id: "w1q4"
    question: "Pandas DataFrame에서 결측치를 그룹별 중앙값으로 대체하는 올바른 방법은?"
    type: "multiple_choice"
    options:
      - "df.fillna(df.median())"
      - "df.groupby('group')['col'].transform(lambda x: x.fillna(x.median()))"
      - "df.dropna()"
      - "df.replace(np.nan, 0)"
    answer: "1"
    explanation: "groupby().transform()을 사용하면 각 그룹의 중앙값으로 해당 그룹의 결측치만 대체할 수 있습니다. 화학 데이터에서는 같은 scaffold 그룹 내에서 대체하는 것이 더 합리적입니다."

  - id: "w1q5"
    question: "PCA에서 '설명된 분산비(explained variance ratio)'가 의미하는 것은?"
    type: "multiple_choice"
    options:
      - "각 주성분이 원본 데이터 분산의 몇 %를 설명하는지"
      - "각 주성분의 절대적 크기"
      - "원본 데이터의 차원 수"
      - "주성분 간의 상관관계"
    answer: "0"
    explanation: "설명된 분산비는 각 주성분의 고유값을 전체 고유값의 합으로 나눈 것입니다. 이를 통해 소수의 주성분으로 원본 데이터의 정보를 얼마나 보존하는지 판단할 수 있습니다. 보통 누적 95%를 기준으로 주성분 수를 결정합니다."

  - id: "w1q6"
    question: "분자 데이터 시각화에서 색맹 친화적 colormap으로 가장 적합한 것은?"
    type: "multiple_choice"
    options:
      - "jet"
      - "rainbow"
      - "viridis"
      - "hot"
    answer: "2"
    explanation: "viridis는 밝기가 균일하게 증가하고, 색맹이 있는 사람도 구분할 수 있도록 설계된 colormap입니다. jet과 rainbow는 밝기가 불균일하고 색맹 친화적이지 않아 과학 논문에서는 권장하지 않습니다."

  - id: "w1q7"
    question: "IC50 값을 ML 모델에 사용하기 전에 pIC50(-log10)로 변환하는 이유는?"
    type: "multiple_choice"
    options:
      - "pIC50가 더 작은 숫자여서 계산이 빨라지므로"
      - "IC50는 로그정규분포를 따르므로 변환 후 정규분포에 가까워져 ML 모델에 적합하기 때문"
      - "pIC50가 국제 표준 단위이기 때문"
      - "변환하지 않으면 Python에서 오류가 발생하기 때문"
    answer: "1"
    explanation: "IC50 값은 보통 수 nM ~ 수 μM 범위로 극단적으로 치우친 분포를 가집니다. -log10 변환 후에는 정규분포에 가까워져 ML 알고리즘(특히 선형 모델)이 더 잘 학습할 수 있습니다. 또한 pIC50가 높을수록 활성이 강하므로 직관적입니다."

  - id: "w1q8"
    question: "Pearson 상관계수와 Spearman 상관계수의 핵심 차이는?"
    type: "multiple_choice"
    options:
      - "Pearson은 선형 관계를, Spearman은 단조(monotonic) 관계를 측정한다"
      - "Pearson은 더 정확하고 Spearman은 근사값이다"
      - "Pearson은 분류에, Spearman은 회귀에 사용한다"
      - "Pearson은 범주형 데이터에, Spearman은 연속형 데이터에 사용한다"
    answer: "0"
    explanation: "Pearson r은 두 변수 간의 선형 관계 강도를 측정합니다. Spearman ρ는 순위(rank) 기반으로 단조 관계를 측정하므로 비선형 관계도 포착할 수 있고, 정규분포 가정이 필요 없습니다."

  - id: "w1q9"
    question: "PCA에서 공분산 행렬의 고유벡터(eigenvector)가 의미하는 것은?"
    type: "multiple_choice"
    options:
      - "데이터의 평균 방향"
      - "데이터에서 분산이 가장 큰 방향(주성분)"
      - "데이터 포인트의 개수"
      - "각 특성의 최소값"
    answer: "1"
    explanation: "공분산 행렬의 고유벡터는 데이터의 분산이 최대인 방향을 나타냅니다. 첫 번째 고유벡터(가장 큰 고유값에 대응)가 첫 번째 주성분(PC1)이 되며, 데이터의 가장 많은 정보를 담고 있는 방향입니다."

  - id: "w1q10"
    question: "200개 분자 기술자에서 PCA로 차원을 축소할 때, 주성분 수를 결정하는 일반적인 기준은?"
    type: "multiple_choice"
    options:
      - "항상 2개로 줄인다"
      - "원래 차원의 절반(100개)을 사용한다"
      - "누적 설명된 분산비가 95% 이상이 되는 최소 주성분 수를 선택한다"
      - "기술자 중 p-value < 0.05인 것만 남긴다"
    answer: "2"
    explanation: "누적 설명된 분산비 95%는 원본 데이터 정보의 95%를 보존하면서 차원을 줄이는 기준입니다. 이를 Elbow plot으로 시각화하여 분산비가 급격히 감소하는 지점(elbow)을 찾는 것도 좋은 방법입니다."
