title: "Week 2: scikit-learn QSAR 모델링 퀴즈"
description: "지도학습, 분류, 모델 평가, 특성 엔지니어링, 클러스터링을 점검합니다"

questions:
  - id: "w2q1"
    question: "QSAR(Quantitative Structure-Activity Relationship) 모델이 예측하는 것은?"
    type: "multiple_choice"
    options:
      - "분자의 3D 결정 구조"
      - "분자의 구조적 특성으로부터 생물학적 활성(예: pIC50, 용해도)"
      - "화학 반응의 메커니즘과 중간체"
      - "임상시험에서의 부작용 발생 확률"
    answer: "1"
    explanation: "QSAR은 분자의 구조적 기술자(descriptor)를 입력으로 받아 생물학적 활성이나 물리화학적 성질(pIC50, logS, logP 등)을 예측하는 통계/ML 모델입니다. 분자 구조와 활성 사이의 정량적 관계를 학습합니다."

  - id: "w2q2"
    question: "QSAR 모델 개발 시 데이터를 train/test로 분할하는 주된 이유는?"
    type: "multiple_choice"
    options:
      - "학습 데이터가 너무 많으면 모델이 느려지므로 줄이기 위해"
      - "모델이 학습에 사용하지 않은 새로운 분자에 대해 얼마나 잘 일반화하는지 평가하기 위해"
      - "sklearn의 fit() 함수가 전체 데이터를 받으면 오류가 발생하므로"
      - "test set은 하이퍼파라미터 튜닝에만 사용하기 위해"
    answer: "1"
    explanation: "Train/test 분할은 모델의 일반화 성능을 공정하게 평가하기 위해 필수적입니다. 학습에 사용하지 않은 분자들에 대한 예측 성능을 측정해야 신약 후보 스크리닝에서 실제로 유용한 모델인지 판단할 수 있습니다."

  - id: "w2q3"
    question: "K-Fold 교차검증(Cross-Validation)이 단순 train/test 분할보다 유리한 점은?"
    type: "multiple_choice"
    options:
      - "항상 더 높은 정확도를 보장한다"
      - "모든 데이터가 한 번씩 검증에 사용되어 성능 추정의 분산이 줄어든다"
      - "학습 시간이 1/K로 줄어든다"
      - "과적합(overfitting)을 완전히 방지한다"
    answer: "1"
    explanation: "K-Fold CV에서는 데이터를 K개 폴드로 나누어 각 폴드가 한 번씩 검증 세트가 됩니다. 이를 통해 모든 데이터가 학습과 검증에 모두 참여하므로, 특정 분할에 의존하지 않는 더 안정적인 성능 추정이 가능합니다. 단, K번 학습하므로 시간은 더 걸립니다."

  - id: "w2q4"
    question: "활성 분자 10%, 비활성 분자 90%인 불균형 데이터셋에서 accuracy가 부적절한 평가 지표인 이유는?"
    type: "multiple_choice"
    options:
      - "accuracy는 회귀 문제에서만 사용할 수 있기 때문"
      - "모든 분자를 비활성으로 예측해도 accuracy 90%를 달성하여, 활성 분자를 전혀 찾지 못하는 모델도 좋아 보이기 때문"
      - "accuracy는 0과 1 사이의 값이 아니기 때문"
      - "sklearn에서 불균형 데이터의 accuracy를 계산할 수 없기 때문"
    answer: "1"
    explanation: "불균형 데이터에서 다수 클래스(비활성)만 예측하는 naive 모델도 90% accuracy를 얻습니다. 신약개발에서는 소수의 활성 분자를 놓치지 않는 것이 중요하므로, Precision, Recall, F1-score, ROC-AUC, PR-AUC 등 불균형에 강건한 지표를 함께 사용해야 합니다."

  - id: "w2q5"
    question: "ROC-AUC 값이 0.5인 분류 모델의 의미는?"
    type: "multiple_choice"
    options:
      - "완벽한 분류 성능을 가진 모델"
      - "랜덤 추측과 동일한 성능으로, 활성/비활성 분자를 구분하는 능력이 없는 모델"
      - "모든 분자를 활성으로 예측하는 모델"
      - "학습이 수렴하지 않아 오류가 발생한 모델"
    answer: "1"
    explanation: "ROC-AUC는 0(완벽한 반전)~1(완벽한 분류) 범위이며, 0.5는 무작위 추측 수준입니다. ROC 곡선에서 대각선(y=x)에 해당합니다. 스크리닝 모델로 사용하려면 최소 0.7 이상, 가능하면 0.8 이상의 AUC를 목표로 합니다."

  - id: "w2q6"
    question: "sklearn에서 class_weight='balanced'를 설정하면 모델 학습에 어떤 영향을 주는가?"
    type: "multiple_choice"
    options:
      - "데이터를 자동으로 오버샘플링(oversampling)하여 클래스 비율을 맞춘다"
      - "소수 클래스(활성 분자)의 샘플에 더 높은 가중치를 부여하여 모델이 소수 클래스를 더 중시하게 한다"
      - "다수 클래스 샘플을 제거하여 균형을 맞춘다"
      - "손실 함수를 MSE에서 Cross-Entropy로 변경한다"
    answer: "1"
    explanation: "class_weight='balanced'는 각 클래스의 가중치를 n_samples / (n_classes * n_samples_per_class)로 설정합니다. 소수 클래스의 오분류가 손실에 더 크게 반영되어, 불균형 데이터에서도 활성 분자를 더 잘 탐지할 수 있습니다. 데이터 자체를 변경하지는 않습니다."

  - id: "w2q7"
    question: "분자 기술자(descriptor) 기반 QSAR에서 특성 스케일링(StandardScaler 등)이 특히 중요한 알고리즘은?"
    type: "multiple_choice"
    options:
      - "Random Forest"
      - "Decision Tree"
      - "로지스틱 회귀(Logistic Regression)와 SVM"
      - "Gradient Boosting"
    answer: "2"
    explanation: "로지스틱 회귀와 SVM은 거리 기반 또는 기울기 기반 최적화를 사용하므로, 특성 스케일이 다르면(예: MW는 100~500, logP는 -2~5) 큰 스케일의 특성이 모델을 지배합니다. 트리 기반 모델(RF, GBDT)은 분할 기준만 사용하므로 스케일에 영향을 덜 받습니다."

  - id: "w2q8"
    question: "Random Forest의 feature_importances_를 통해 얻을 수 있는 정보는?"
    type: "multiple_choice"
    options:
      - "각 특성이 예측에 기여하는 상대적 중요도 (Gini impurity 감소량 기준)"
      - "각 특성의 통계적 유의성(p-value)"
      - "각 특성과 타깃 변수 간의 선형 상관계수"
      - "각 특성의 분산(variance)"
    answer: "0"
    explanation: "Random Forest의 feature importance는 각 특성이 트리 분할에 사용될 때 불순도(Gini impurity 또는 MSE)를 얼마나 감소시키는지의 평균입니다. QSAR에서는 어떤 분자 기술자가 활성 예측에 가장 중요한지 해석하는 데 유용합니다. 단, 상관된 특성 간에 중요도가 분산될 수 있어 permutation importance도 함께 확인하는 것이 좋습니다."

  - id: "w2q9"
    question: "sklearn Pipeline으로 StandardScaler와 모델을 묶어 사용하는 주된 이점은?"
    type: "multiple_choice"
    options:
      - "모델의 정확도가 자동으로 향상된다"
      - "교차검증 시 각 폴드에서 스케일링이 올바르게 적용되어 데이터 누출(data leakage)을 방지한다"
      - "학습 속도가 2배 빨라진다"
      - "하이퍼파라미터 튜닝이 불필요해진다"
    answer: "1"
    explanation: "Pipeline 없이 전체 데이터에 스케일링을 먼저 적용하면, test 데이터의 통계가 scaler에 반영되어 데이터 누출이 발생합니다. Pipeline은 cross_val_score 등에서 각 폴드마다 train에서만 fit_transform하고 test에는 transform만 적용하여 올바른 평가를 보장합니다."

  - id: "w2q10"
    question: "K-Means와 DBSCAN 클러스터링의 핵심적인 차이점은?"
    type: "multiple_choice"
    options:
      - "K-Means는 비지도학습이고 DBSCAN은 지도학습이다"
      - "K-Means는 클러스터 수를 미리 지정해야 하고, DBSCAN은 밀도 기반으로 클러스터 수를 자동 결정하며 노이즈를 식별할 수 있다"
      - "K-Means는 대용량 데이터에 사용 불가능하고 DBSCAN만 사용 가능하다"
      - "K-Means는 유클리드 거리만, DBSCAN은 코사인 거리만 사용한다"
    answer: "1"
    explanation: "K-Means는 k를 지정해야 하며 구형(spherical) 클러스터를 가정합니다. DBSCAN은 밀도가 높은 영역을 클러스터로 인식하여 비구형 클러스터도 탐지하고, 저밀도 포인트를 노이즈(-1)로 분류합니다. 화합물 라이브러리에서 구조적으로 다양한 클러스터와 이상치(singleton) 분자를 구분할 때 DBSCAN이 유용합니다."
