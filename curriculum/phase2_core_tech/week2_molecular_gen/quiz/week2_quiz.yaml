title: "Phase 2 Week 2: 분자 생성과 최적화 퀴즈"
description: "De Novo 분자 설계의 세 패러다임(VAE/GAN, 강화학습, 확산 모델)과 산업 현장의 평가·합성성·MPO·IP 한계를 종합 점검합니다."
questions:
  - id: "p2w2q1"
    question: "De Novo 분자 설계가 전통적 가상 스크리닝(virtual screening)과 본질적으로 다른 점으로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "가상 스크리닝은 GPU를 사용하고 De Novo는 CPU를 사용한다"
      - "가상 스크리닝은 주어진 라이브러리(약 10^9~10^11)에서 검색하지만, De Novo는 확률 모델로 새 분자를 생성하여 사실상 무한한 약물 유사 공간(약 10^23~10^33)을 탐색한다"
      - "가상 스크리닝은 약학 전공자만 사용 가능하다"
      - "De Novo는 도킹 점수를 사용하지 않는다"
    answer: "1"
    explanation: "De Novo의 패러다임 전환은 '검색→생성'입니다. 라이브러리에 없는 chemotype은 가상 스크리닝으로 결코 발견할 수 없지만, 학습된 확률 모델은 약물 유사 공간 전체를 잠재적으로 sampling할 수 있습니다."

  - id: "p2w2q2"
    question: "VAE(변분 오토인코더)의 잠재 공간(latent space)이 약학적으로 갖는 가장 중요한 의미는?"
    type: "multiple_choice"
    options:
      - "분자의 분자량을 직접 표현한다"
      - "분자를 압축한 후 다시 복원만 가능하다"
      - "물성 좌표화(property coordinatization)가 가능 — logP·BBB·QED 등 약학적 축을 잠재 공간에서 발견하고, 그 방향으로 분자를 이동시켜 SAR 표를 따라 R-그룹을 치환하듯 최적화할 수 있다"
      - "잠재 공간은 분자의 3D 좌표를 직접 저장한다"
    answer: "2"
    explanation: "VAE의 잠재 공간은 연속이고 의미 있는 축을 가질 수 있습니다. 약학 전공자는 SAR 표를 따라 R-그룹을 치환하듯 잠재 공간에서 분자를 이동시켜 물성을 조정할 수 있습니다."

  - id: "p2w2q3"
    question: "강화학습 기반 분자 생성(예: REINVENT)에서 약학 전공자의 차별적 우위가 가장 잘 발휘되는 영역은?"
    type: "multiple_choice"
    options:
      - "GPU 학습 최적화"
      - "Policy gradient 알고리즘 자체 개량"
      - "보상 함수(reward function) 설계 — Target Product Profile(TPP)을 임상 단계 go/no-go 기준으로 코드화하고, hERG·CYP 등 ADMET 페널티를 임상 가이드라인 근거로 가중치 부여"
      - "GAN 판별자 학습 안정화"
    answer: "2"
    explanation: "RL의 보상 함수는 사실상 TPP를 수식으로 번역하는 작업입니다. 비전공자가 모든 ADMET을 균등 가중하는 동안, 약학 전공자는 임상 가이드라인(ICH S7B 등) 근거로 hard constraint와 soft penalty를 정렬할 수 있습니다."

  - id: "p2w2q4"
    question: "3D 확산 모델(예: TargetDiff)에서 E(3)/SE(3) equivariance가 필요한 이유로 가장 정확한 것은?"
    type: "multiple_choice"
    options:
      - "회전·평행이동에 따라 분자의 에너지·결합 친화력은 변하지 않아야 하므로, 좌표계에 의존하는 인공적 패턴을 학습하지 않도록 아키텍처에 물리적 대칭성을 내재화한다"
      - "Equivariance는 학습 속도를 빠르게 한다"
      - "Equivariance는 GPU 메모리를 줄인다"
      - "Equivariance는 SMILES 처리에 필요하다"
    answer: "0"
    explanation: "분자의 물리적 성질은 좌표계 회전·평행이동에 불변이어야 합니다. E(3)/SE(3) equivariant network(EGNN, SE(3)-Transformer)는 이 물리적 제약을 아키텍처에 내재화하여, 약학적으로는 pharmacophore의 상대적 3D 배치를 인식하는 사고와 정렬됩니다."

  - id: "p2w2q5"
    question: "단백질 포켓 조건부 3D 분자 생성(SBDD with diffusion, 예: TargetDiff/DecompDiff)이 가장 큰 산업적 의미를 갖는 이유는?"
    type: "multiple_choice"
    options:
      - "기존 가상 스크리닝보다 무조건 정확하기 때문"
      - "단백질 binding pocket을 condition으로 받아 한 번의 forward sampling으로 결합 가능성이 높은 신규 3D 리간드를 생성 — medicinal chemist가 cavity를 보며 손으로 그리던 작업의 알고리즘화이며, IP 신규성이 높은 분자를 빠르게 만들 수 있다"
      - "단백질 자체를 새로 합성할 수 있기 때문"
      - "확산 모델은 도킹이 필요 없기 때문"
    answer: "1"
    explanation: "포켓 조건부 SBDD 확산은 — 도킹·MD 없이 신규 IP 분자를 빠르게 생성합니다. 1 포켓당 1,000개 분자를 1~4시간에 만들 수 있으며, IP 가치가 높은 신규 chemotype을 탐색할 수 있어 산업적 의미가 큽니다."

  - id: "p2w2q6"
    question: "MOSES·GuacaMol 같은 생성 모델 벤치마크에서 SOTA를 달성한 모델이 wet lab 활성과 0.4~0.6 수준의 상관계수만 보이는 현실의 가장 적절한 해석은?"
    type: "multiple_choice"
    options:
      - "생성 모델은 본질적으로 쓸모없다"
      - "Validity·Uniqueness·Novelty·QED 같은 표준 지표가 약학적 의미(실제 결합·활성·ADMET)를 충분히 반영하지 못하므로, 약학 전공자가 보상 함수와 평가 게이트를 임상 단계 기준으로 재설계해야 한다"
      - "Wet lab 실험이 잘못된 것이다"
      - "GPU 성능을 더 늘리면 해결된다"
    answer: "1"
    explanation: "벤치마크 지표의 환상(illusion)은 약학적 의미 부재 때문입니다. 약학 전공 창업자의 우위는 — TPP·임상 go/no-go·ADMET 게이트를 평가 체계에 정렬하여 in silico 평가의 wet lab 예측력을 끌어올리는 데 있습니다."

  - id: "p2w2q7"
    question: "산업 현장에서 RL/MPO 분자 생성의 4가지 전형적 함정 중 '보상 해킹(reward hacking)'에 해당하는 증상은?"
    type: "multiple_choice"
    options:
      - "GPU 메모리 부족"
      - "QED·SAscore 같은 보조 보상은 만점인데 실제 활성은 없는 분자가 대량 생성되는 현상 — 보조 보상이 주 보상을 압도하여 모델이 게임화된 출력만 만든다"
      - "분자량이 너무 커지는 현상"
      - "학습이 발산하는 현상"
    answer: "1"
    explanation: "보상 해킹은 RL에서 가장 흔한 실패 모드입니다. QED·SAscore가 만점인 의미 없는 분자가 양산되는 이유는 — 보조 보상의 가중치 정규화 실패와 주 보상(예: docking score)이 약학적으로 약한 신호일 때입니다."

  - id: "p2w2q8"
    question: "분자 생성 모델 선택의 통합 의사결정 트리에서 '표적 단백질 3D 구조가 있고, 알려진 활성 리간드 데이터가 100개 미만'인 경우 가장 합리적인 1차 선택은?"
    type: "multiple_choice"
    options:
      - "VAE (JT-VAE) 리간드 기반 생성"
      - "확산 모델 (TargetDiff/DecompDiff) — 포켓 조건부 3D 생성으로 리간드 데이터 부족을 보완"
      - "Hansch 회귀"
      - "단순 가상 스크리닝"
    answer: "1"
    explanation: "리간드 데이터가 부족하면 RL의 보상 함수를 충분히 학습시키기 어렵지만, 표적 3D 구조가 있으면 — 포켓 조건부 확산 모델(TargetDiff/DecompDiff)이 표적 정보만으로 신규 리간드를 생성할 수 있어 데이터 부족을 보완합니다."

  - id: "p2w2q9"
    question: "약학 전공 1인 창업자가 De Novo 분자 생성 SaaS로 진입할 때, 정면 경쟁(Insilico, Iambic 등)이 어려운 상황에서 가장 현실적인 차별화 전략은?"
    type: "multiple_choice"
    options:
      - "자체 Foundation Model을 처음부터 사전학습"
      - "GPU 인프라 가격 경쟁"
      - "공개 사전학습 가중치(TargetDiff·DecompDiff·REINVENT 4) wrapper SaaS에 — 특정 표적 family(GPCR/kinase/ion channel 등) 특화 + ADMET 게이트 통합 + 임상 단계 go/no-go 코드화를 3중 차별점으로 결합"
      - "한국어 UI만 제공"
    answer: "2"
    explanation: "공개 모델 wrapper에 약학적 깊이를 결합한 전략이 1인 창업자에게 현실적입니다. 표적 family 특화·ADMET 통합·임상 게이트 정렬은 — 비전공자가 모방하기 어려운 도메인 해자입니다."

  - id: "p2w2q10"
    question: "Insilico Medicine의 INS018_055(IPF 치료제, 약 30개월에 생성→임상 진입)가 단일 모델이 아닌 멀티모델 파이프라인(Chemistry42 분자 생성 + PandaOmics 타겟 + cascade ADMET)을 사용한 사실의 창업적 시사점은?"
    type: "multiple_choice"
    options:
      - "단일 SOTA 생성 모델 하나면 충분하다"
      - "산업 최전선에서도 De Novo는 RL·확산·사전학습·cascade ADMET을 조합한 멀티모델 파이프라인이며, 그 위에 약학적 의사결정 게이트가 정렬된 구조가 성공 패턴이다 — 스타트업도 처음부터 단일 모델 만능론을 거부하고 cascade를 설계해야 한다"
      - "AI는 신약개발에 도움이 안 된다"
      - "임상 진입에는 30개월 이상이 항상 필요하다"
    answer: "1"
    explanation: "INS018_055는 산업 최전선의 표준 패턴을 보여줍니다 — 멀티모델 cascade + 약학적 게이트 정렬. 1인 창업자도 단일 모델 SOTA가 아닌 cascade 아키텍처와 약학적 게이트 설계에 집중해야 합니다."
