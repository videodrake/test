title: "Phase 2 Week 3: ADMET과 독성 예측 퀴즈"
description: "ADMET 5축의 약학적 의미, AI 예측 표준, MPO 통합 의사결정, 그리고 약학 전공자의 차별적 판단 레이어를 종합 점검합니다."
questions:
  - id: "p2w3q1"
    question: "ADMET 예측이 AI 신약개발에서 약학 전공자의 우위가 가장 직접적으로 발현되는 영역인 이유로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "ADMET 모델이 다른 AI 모델보다 GPU를 적게 쓰기 때문"
      - "임상 실패의 약 50~60%가 ADMET·안전성 관련이며, 각 축의 임계값과 go/no-go 기준은 적응증·표적·투여 경로별 임상·규제 지식 없이는 잘못 적용되기 쉽기 때문"
      - "ADMET 데이터셋이 가장 크기 때문"
      - "ADMET 모델은 코드가 단순하기 때문"
    answer: "1"
    explanation: "ADMET 실패 통계(Hay 2014, Sun 2022)와 적응증·표적별 임계값의 차이가 핵심입니다. 예를 들어 hERG IC50의 일반 cutoff은 항부정맥제에서는 정반대로 작동합니다."

  - id: "p2w3q2"
    question: "Caco-2 투과성 예측 모델의 출력을 약학 전공자가 임상적으로 해석할 때 가장 중요한 보정은?"
    type: "multiple_choice"
    options:
      - "GPU 사용량 보정"
      - "단순 logP 보정"
      - "투여 경로·표적 조직과의 정렬 — 경구 약물에 대해서는 Caco-2가 중요하지만, 국소 투여·정맥 투여 후보에는 무관할 수 있고, 표적이 장 점막일 경우엔 의미가 다르다"
      - "분자량 보정만 충분"
    answer: "2"
    explanation: "Caco-2는 경구 약물의 장관 흡수 모사이지만, 투여 경로·표적 조직에 따라 그 의미가 달라집니다. 약학 전공자는 적응증·경로 맥락에서 모델 출력을 해석합니다."

  - id: "p2w3q3"
    question: "PPB(혈장 단백질 결합률) 예측이 hERG safety margin 계산과 결합되어야 하는 이유는?"
    type: "multiple_choice"
    options:
      - "PPB가 분자량과 같기 때문"
      - "PPB는 hERG와 무관"
      - "심독성을 유발하는 것은 자유 약물(unbound drug) — 자유 C_max = 총 C_max × (1 − PPB)로 보정해야 hERG IC50과 비교한 safety margin이 실제 임상 위험을 반영한다"
      - "PPB는 CYP 대사에만 영향"
    answer: "2"
    explanation: "자유 약물 가설은 약리학 기본 원리입니다. PPB 99% 약물은 자유 C_max가 1%만 되어 — 총 C_max 기준 safety margin과 자유 C_max 기준 margin이 100배 차이 나며, 임상 hERG 위험 판단이 완전히 달라집니다."

  - id: "p2w3q4"
    question: "CYP3A4 기질·억제 예측이 임상적으로 가장 중요한 이유는?"
    type: "multiple_choice"
    options:
      - "CYP3A4가 가장 새로운 효소이기 때문"
      - "전체 시판 약물의 약 50%를 CYP3A4가 대사하며, 강한 CYP3A4 억제·유도는 임상에서 약물 상호작용(DDI)의 가장 큰 원인이고 시판 후 회수의 핵심 위험"
      - "CYP3A4는 신장에만 있기 때문"
      - "CYP3A4 모델 학습 데이터가 가장 작기 때문"
    answer: "1"
    explanation: "CYP3A4는 양적·질적으로 가장 중요한 대사 효소입니다. terfenadine·cisapride 회수의 직접 원인이 CYP3A4 매개 DDI였으며, FDA·EMA의 DDI 가이드라인은 CYP3A4 평가를 의무화합니다."

  - id: "p2w3q5"
    question: "hERG IC50 예측에서 'safety margin ≥ 30배'의 약학적 의미로 가장 정확한 것은?"
    type: "multiple_choice"
    options:
      - "단순 임의 숫자"
      - "hERG 채널의 분자 크기에 따른 기하학적 비율"
      - "임상 cardiotoxicity 위험을 발견 단계에서 사전 차단하기 위한 산업·규제 표준 cut-off이며, 자유 C_max 기준으로 계산해야 의미가 있다"
      - "분자량 30 Da 이상이라는 의미"
    answer: "2"
    explanation: "safety margin ≥ 30(자유 C_max 기준)은 ICH S7B 평가 전 발견 단계의 산업 표준입니다. hERG IC50 < 자유 C_max × 30이면 임상 진입 시 QT 연장·TdP 위험이 합리적으로 낮아진다는 경험칙입니다."

  - id: "p2w3q6"
    question: "ICH M7 가이드라인이 변이원성 평가에서 AI 단독 예측을 수용하지 않고 'expert-guided' 시스템을 요구하는 이유는?"
    type: "multiple_choice"
    options:
      - "AI가 GPU를 너무 많이 쓰기 때문"
      - "AI 단일 모델의 false negative는 변이원성·발암성을 임상·시판 단계로 통과시킬 위험이 있고, 규제 측면에서 structural alert 기반 SAR 전문가 검토와 결합되어야 신뢰가 확보되기 때문"
      - "AI 모델은 비싸기 때문"
      - "AI는 한국에서만 사용 가능하기 때문"
    answer: "1"
    explanation: "변이원성 false negative의 임상·시판 비용이 매우 높아 — ICH M7은 AI + structural alert + expert review의 통합 시스템을 요구합니다. 약학 전공자의 SAR 해석 능력이 규제 수용성의 핵심입니다."

  - id: "p2w3q7"
    question: "DILI 예측이 단일 이진 분류가 아닌 multi-mechanism panel(BSEP + 미토콘드리아 + 반응성 대사물)로 구성되어야 하는 이유는?"
    type: "multiple_choice"
    options:
      - "여러 모델이 GPU 활용에 좋기 때문"
      - "DILI는 intrinsic(용량 의존)과 idiosyncratic(특발성, 면역 매개)의 별개 메커니즘을 가지며, 단일 분류는 메커니즘별 위험 신호를 구분하지 못해 임상 외삽도가 낮기 때문"
      - "DILI 데이터셋이 너무 작기 때문에 모델을 늘려야"
      - "여러 모델이 성능 평균이 좋기 때문"
    answer: "1"
    explanation: "DILI 단일 모델의 한계는 — troglitazone(미토콘드리아), ximelagatran(면역 매개) 같은 메커니즘 차이를 구분하지 못한다는 것입니다. BSEP·미토콘드리아·반응성 대사물 패널이 임상 외삽도를 5~8% AUROC 향상시키며 메커니즘별 SAR 개입이 가능해집니다."

  - id: "p2w3q8"
    question: "다중 파라미터 최적화(MPO)에서 가중 평균과 기하 평균 중 hERG·Ames 같은 hard cutoff 속성에 더 적합한 통합 방법은?"
    type: "multiple_choice"
    options:
      - "가중 평균이 적합 — 한 속성이 0이어도 다른 속성으로 보상 가능"
      - "기하 평균이 적합 — 한 속성이 0이면 전체가 0이 되어 hard cutoff 효과가 자연스럽게 유지되고, hERG·Ames 같은 절대적 안전성 게이트에 적합"
      - "단순 평균이 가장 적합"
      - "두 방법 모두 동일"
    answer: "1"
    explanation: "기하 평균 D = Π d_i(x_i)^w_i는 — 한 desirability가 0이면 전체가 0이 되어, hERG·Ames 같이 어떤 다른 우수성으로도 보상할 수 없는 절대적 안전 게이트에 적합합니다. Pfizer MPO·Roche CNS MPO 등 산업 표준이 이를 활용합니다."

  - id: "p2w3q9"
    question: "CNS 약물 후보 평가에서 Pfizer CNS MPO를 적용해야 하고 단순 QED만으로는 부족한 가장 중요한 이유는?"
    type: "multiple_choice"
    options:
      - "QED가 더 빠르기 때문"
      - "CNS 약물은 BBB 통과를 위해 clogP, clogD7.4, TPSA, HBD 등 BBB 특유의 desirability 변곡점이 필요하며, QED는 일반 drug-likeness만 평가해 BBB 통과 가능성을 분리하지 못하기 때문"
      - "QED는 약학적 의미가 없기 때문"
      - "QED는 분자량을 무시"
    answer: "1"
    explanation: "Pfizer CNS MPO는 BBB 통과 가능성에 특화된 6개 속성의 desirability 통합입니다. QED는 일반 drug-likeness이므로 CNS 약물의 핵심 게이트(BBB)에 정렬되지 않습니다. 적응증별 MPO 분기가 약학 전공자의 차별 영역입니다."

  - id: "p2w3q10"
    question: "약학 전공 1인 창업자가 ADMET MPO SaaS로 진입할 때, ADMET-AI(Stanford 2024) 같은 무료 도구와 차별화하는 가장 현실적인 전략은?"
    type: "multiple_choice"
    options:
      - "자체 ADMET Foundation Model을 처음부터 사전학습"
      - "GPU 인프라 가격 경쟁"
      - "오픈 모델(Chemprop + ADMET-AI baseline) wrapper SaaS에 — (a) 적응증별 MPO 분기 라이브러리, (b) 자유 약물 보정 + hERG safety margin 자동 계산, (c) ICH M7 자동 분류 + 규제 권고문 자동 생성, (d) DILI multi-mechanism panel을 결합해 '약사가 만든 규제·임상 친화 ADMET MPO'로 포지셔닝"
      - "한국어 UI만 제공"
    answer: "2"
    explanation: "1인 창업자에게 모델 자체로 경쟁하는 것은 비현실적입니다. 적응증 분기·자유 약물 보정·ICH 자동 매핑·DILI multi-mechanism은 — 비약학 경쟁자가 6~18개월 학습 격차를 따라잡기 어려운 도메인 해자이며, ADMET-AI 같은 무료 도구 위에 약학·규제 후처리 레이어로 차별화하는 것이 현실적 전략입니다."
