title: "Phase 2 Week 3: ADMET과 독성 예측 퀴즈"
description: "ADMET 5축의 개별 예측(흡수·분포·대사·배설·독성)과 MPO 통합 의사결정, 약학 전공자의 차별 레이어를 종합 점검합니다."
questions:
  - id: "p2w3q1"
    question: "Sun et al. 2022(*Acta Pharm. Sin. B*) 분석에서 — 임상 단계 약물 실패의 가장 흔한 원인 두 가지를 가장 정확히 짝지은 것은?"
    type: "multiple_choice"
    options:
      - "제조 공정 문제와 IP 분쟁"
      - "효능(efficacy) 부족과 안전성(safety) 문제 — 두 원인이 임상 실패의 약 70% 이상을 차지"
      - "환자 모집 실패와 가격 협상 실패"
      - "단순 행정 지연"
    answer: "1"
    explanation: "임상 실패의 주된 원인은 효능 부족(~40~50%)과 안전성(~30%)입니다. ADMET 예측은 안전성 실패와 PK 문제를 발견 단계에서 사전 차단해 임상 도달 후보의 질을 높이는 핵심 도구입니다."

  - id: "p2w3q2"
    question: "BCS(Biopharmaceutics Classification System) Class IV 분자(저용해도·저투과성)에 대한 가장 적절한 약학적 판단은?"
    type: "multiple_choice"
    options:
      - "경구 흡수가 매우 어려워 — 일반적으로 발견 단계에서 폐기하거나, 제형 기술(나노현탁액, 지질 기반, 프로드러그)로 극복 전략이 필요하다"
      - "Class IV는 흡수가 가장 우수하다"
      - "용해도가 낮아도 투과성이 좋으면 IV로 분류된다"
      - "Class IV는 BBB 투과 분류에만 쓰인다"
    answer: "0"
    explanation: "BCS Class IV는 용해도·투과성 모두 낮아 경구 흡수가 가장 어려운 분류입니다. 발견 단계에서 Class IV 신호가 나오면 — scaffold 수정 또는 제형 기술의 비용·시간 부담을 사전 평가해야 하며, 이 판단이 약학 전공자의 차별 영역입니다."

  - id: "p2w3q3"
    question: "혈장 단백질 결합률(PPB)이 99%에서 99.5%로 바뀐다는 정보의 임상적 의미로 가장 정확한 것은?"
    type: "multiple_choice"
    options:
      - "임상적으로 무의미한 변화이다"
      - "자유 분율(fu)이 1%에서 0.5%로 *반감*되어 — 약리 활성 농도가 절반으로 감소하거나 DDI 위험이 크게 변할 수 있다"
      - "총 혈장 농도가 두 배가 된다"
      - "약물의 분자량이 두 배 증가했다는 신호이다"
    answer: "1"
    explanation: "PPB 99% → 99.5%는 fu가 1% → 0.5%로 절반이 됩니다. 약효는 자유 분율에 비례하므로 — 이 작은 차이가 약리·DDI에 큰 영향을 줍니다. 절대 fu를 정량적으로 해석하는 능력이 약학 전공자의 차별 자산입니다."

  - id: "p2w3q4"
    question: "CYP3A4 *기질(substrate)* 분자와 *억제제(inhibitor)* 분자의 구분이 약학적으로 왜 중요한가?"
    type: "multiple_choice"
    options:
      - "기질·억제제는 같은 의미이다"
      - "두 분류 모두 약물상호작용 위험과 직결되지만 — 기질은 *자신*이 다른 약물에 의해 영향받는 위험이고, 억제제는 *동반 약물*의 노출을 변화시키는 위험이며, 임상 권고와 라벨 문구가 달라진다"
      - "기질은 발견 단계에서 무시해도 된다"
      - "억제제만 ADMET 평가가 필요하다"
    answer: "1"
    explanation: "기질은 victim, 억제제는 perpetrator 관점의 DDI입니다. 두 분류는 FDA·EMA 약물상호작용 라벨 문구가 다르며, 약학 전공자는 두 신호를 분리해 임상 위험 등급을 부여해야 합니다."

  - id: "p2w3q5"
    question: "hERG IC50 = 5 μM, 목표 자유 C_max = 0.1 μM인 분자의 safety margin과 발견 단계 결정으로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "Margin = 5/0.1 = 50배 — 일반적으로 안전 여유가 충분하다고 평가되며, 후속 in vivo QT 평가를 진행할 수 있다"
      - "Margin = 0.1/5 = 0.02 — 즉시 폐기"
      - "Margin은 hERG IC50만으로 결정된다"
      - "fu와 무관하게 총 C_max로 계산해야 한다"
    answer: "0"
    explanation: "safety margin = hERG IC50 / 자유 C_max = 50배입니다. 표준 cut-off는 30배이며 — 이 분자는 발견 단계에서는 통과합니다. *자유* C_max를 기준으로 계산해야 한다는 점이 핵심이며, 총 C_max를 쓰면 margin이 과대평가됩니다."

  - id: "p2w3q6"
    question: "특발성 DILI(idiosyncratic Drug-Induced Liver Injury)의 AI 예측이 어려운 가장 본질적인 이유는?"
    type: "multiple_choice"
    options:
      - "데이터가 너무 많아서"
      - "면역 매개·HLA 다형성·반응성 대사물 등 환자 유전형 의존 메커니즘이 분자 구조 정보만으로는 충분히 포착되지 않기 때문"
      - "AI 모델이 단순해서"
      - "DILI는 예측 가능한 영역이다"
    answer: "1"
    explanation: "특발성 DILI는 환자 100,000명당 1~10건의 드문 빈도이며, HLA 다형성·면역 매개 등 환자 측 변수에 의존합니다. 분자 구조만으로는 예측 한계가 명확하며 — BSEP·미토콘드리아·반응성 대사물의 multi-mechanism panel이 단일 모델보다 임상 외삽도가 높습니다."

  - id: "p2w3q7"
    question: "ICH M7 가이드라인의 변이원성 분류에서 — Class 3(경계성 구조 alert) 분자에 대한 표준 처리로 가장 적절한 것은?"
    type: "multiple_choice"
    options:
      - "즉시 폐기"
      - "TTC(독성학적 우려 임계값) 1.5 μg/day 한도 적용 또는 추가 평가·정제 강화"
      - "라벨에 발암성 경고 표시"
      - "임상시험 면제"
    answer: "1"
    explanation: "ICH M7 Class 3은 경계성 구조 alert가 있으나 동일 scaffold의 안전성 데이터가 부족한 경우입니다. TTC 1.5 μg/day의 일일 허용량을 적용하거나 정제 공정 강화 또는 추가 변이원성 평가가 표준 처리입니다. 이 자동 분류 시스템이 SaaS의 규제 외삽 레이어 핵심 자산입니다."

  - id: "p2w3q8"
    question: "ADMET MPO 점수를 산술평균이 아닌 *기하평균*으로 계산하는 약학적 정당성은?"
    type: "multiple_choice"
    options:
      - "기하평균이 계산이 더 빠르기 때문"
      - "한 축(예: hERG IC50 < 1 μM)이 0이면 다른 축의 우수성으로 보상되지 않고 전체 점수가 0이 되어 — '약점 거부' 의사결정이 자동 반영되기 때문"
      - "기하평균이 더 큰 값을 출력하기 때문"
      - "둘은 동일하다"
    answer: "1"
    explanation: "신약 후보 의사결정은 — 한 축이 치명적이면(hERG, DILI) 다른 축의 우수성으로 보상할 수 없습니다. 기하평균은 한 축이 0이면 전체가 0이 되어 약점 거부를 자동화하며, 약학적 직관과 일치합니다."

  - id: "p2w3q9"
    question: "ADMET SaaS의 시장 포지셔닝으로 — '약사가 만든 규제 친화 ADMET'이 빅파마 표준(Schrödinger, Simulations Plus) 대비 갖는 가장 본질적인 차별 자산은?"
    type: "multiple_choice"
    options:
      - "더 빠른 GPU 학습"
      - "ICH M7/E14/S7B 가이드라인 자동 매핑, 적응증·환자군별 desirability 프리셋, 회수 약물 유사도 경고 등 — 약학·규제 지식이 코드로 자동화된 후처리 레이어"
      - "더 낮은 가격만으로 충분한 차별"
      - "오픈소스 코드 공개"
    answer: "1"
    explanation: "빅파마 표준 도구는 raw 예측 출력이 강점이지만 — 규제·임상·적응증 후처리는 사용자(메디시널 케미스트·약리학자) 몫입니다. 약학 전공자의 지식이 코드로 자동화되면 — 비약학 경쟁자가 6~12개월 학습 격차를 따라잡기 어려운 해자가 됩니다."

  - id: "p2w3q10"
    question: "1인 약학 전공 창업자가 ADMET SaaS의 MVP를 가장 현실적으로 구축하는 순서로 적절한 것은?"
    type: "multiple_choice"
    options:
      - "처음부터 단백질 구조 기반 도킹 + de novo 생성 모델 통합 풀스택 구축"
      - "(1) ADMET-AI 또는 Chemprop 베이스라인 약 1주, (2) 약학·규제 후처리 레이어 2~4주, (3) 적응증별 desirability 프리셋 라이브러리 2~4주 — 총 2~3개월 MVP"
      - "FDA 승인 신청을 먼저 진행한 뒤 코드 작성"
      - "수십억 원 투자 유치 후 100명 팀 빌딩이 우선"
    answer: "1"
    explanation: "Week 3의 실천적 결론은 — 오픈소스 베이스라인을 활용해 단기 MVP를 만들고, 차별은 약학·규제 후처리 레이어에 집중하는 것입니다. 1인 창업자라도 2~3개월에 차별화 가능한 MVP가 현실적입니다."
